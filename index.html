<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이화 러너즈: 정복 완성하기</title>
    <style>
        body { margin: 0; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 4px solid #34495e; background: #ecf0f1; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
<canvas id="game" width="400" height="600"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 게임 데이터: 0단계 사복 -> 5단계 정복
let player = { lane: 1, stage: 0 };
let items = [];
let gameRunning = true;

// 1. 키보드 컨트롤 (이동)
window.addEventListener("keydown", (e) => {
    if(e.key === "ArrowLeft" && player.lane > 0) player.lane--;
    if(e.key === "ArrowRight" && player.lane < 2) player.lane++;
});

// 2. 게임 루프 (이동, 충돌, 그리기)
function update() {
    if(!gameRunning) return;

    // 아이템 생성 (랜덤)
    if(Math.random() < 0.02) {
        items.push({ lane: Math.floor(Math.random()*3), y: 0, type: Math.floor(Math.random()*5) });
    }

    // 아이템 이동 및 충돌
    items.forEach((item, index) => {
        item.y += 5;
        // 충돌 체크
        if(item.y > 480 && item.y < 520 && item.lane === player.lane) {
            if(item.type === player.stage) {
                player.stage++; // 순서대로 먹으면 단계 상승
            } else {
                player.stage = Math.max(0, player.stage - 1); // 엉뚱한 거 먹으면 하락
            }
            items.splice(index, 1);
        }
    });

    draw();
    requestAnimationFrame(update);
}

// 3. 화면 그리기 (학교 배경 + 아이템 + 캐릭터)
function draw() {
    ctx.clearRect(0, 0, 400, 600);
    
    // 배경: 복도 라인
    ctx.strokeStyle = "#bdc3c7";
    ctx.strokeRect(133, 0, 1, 600); ctx.strokeRect(266, 0, 1, 600);

    // 캐릭터 (묶은 머리)
    ctx.fillStyle = "#9b59b6";
    ctx.fillRect(113 + player.lane * 133, 500, 40, 40);
    ctx.fillStyle = "black";
    ctx.fillText("Stage: " + player.stage, 10, 20);

    // 아이템
    items.forEach(item => {
        ctx.fillStyle = item.type === player.stage ? "#27ae60" : "#e74c3c";
        ctx.fillRect(123 + item.lane * 133, item.y, 20, 20);
    });

    if(player.stage >= 5) {
        gameRunning = false;
        alert("등교 성공!");
    }
}

update();
</script>
</body>
</html>
