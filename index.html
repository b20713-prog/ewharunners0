<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이화 러너즈: 원작 초월 에디션</title>
    <style>
        body { margin: 0; background: #0b0f19; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; }
        #gameCanvas { border: 6px solid #10b981; box-shadow: 0 0 30px rgba(16, 185, 129, 0.4); border-radius: 24px; }
        .tip { color: #475569; margin-top: 15px; font-size: 14px; font-weight: bold; letter-spacing: 1px; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="450" height="700"></canvas>
<div class="tip">
    🏃‍♀️ 3라인 하드코어 복도 질주! 사복 함정을 피하고 장애물을 뛰어넘으세요! 🏃‍♀️<br>
    🎮 조작: [ A / D ] 또는 [ 좌우 방향키 ] 이동 | [ Spacebar ] 또는 [ W ]로 초고공 점프!
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// 화면 크기 조정에 따른 라인 배치 최적화 (좌, 중, 우 3구역 완벽 구현)
const lanes = [90, 225, 360];
let player = { lane: 1, currentX: 225, targetX: 225, yOffset: 0, vy: 0, isGrounded: true, stage: 0, animFrame: 0 };
let items = [];
let spawnTimer = 0;
let teacherDistance = 5.0; 
let score = 0;
let isGameOver = false;
let gameTime = 0;
let gameSpeed = 5.5; 

const gravity = 0.7;

// 아이템 대비 극대화를 위한 검은색 하이라이트 아웃라인 선언
const itemStroke = "#000000";

window.addEventListener("keydown", e => {
    if (isGameOver) return;
    
    if ((e.key === "ArrowLeft" || e.key === "a" || e.key === "A") && player.lane > 0) player.lane--;
    if ((e.key === "ArrowRight" || e.key === "d" || e.key === "D") && player.lane < 2) player.lane++;
    player.targetX = lanes[player.lane];

    // 점프 높이 상향으로 거대 장애물 돌파력 제공
    if ((e.key === "ArrowUp" || e.key === "w" || e.key === "W" || e.key === " ") && player.isGrounded) {
        player.vy = -13.5;
        player.isGrounded = false;
    }
});

function spawn() {
    if (player.stage >= 5) return;
    let rLane = Math.floor(Math.random() * 3);
    
    // [피드백 반영] 장애물 스폰 밀도를 대폭 상향 (48% 확률) 및 빽빽한 배치 레이아웃 구조
    if (Math.random() < 0.48) {
        let obsTypes = ["giant_cart", "stacked_desks", "high_hurdle"];
        items.push({ x: lanes[rLane], y: -80, lane: rLane, isObstacle: true, obsType: obsTypes[Math.floor(Math.random() * obsTypes.length)] });
    } else {
        let tLane = (rLane + Math.floor(Math.random() * 2) + 1) % 3;
        items.push({ x: lanes[rLane], y: -80, lane: rLane, isTrap: false, isObstacle: false, type: player.stage, pulse: 0 });
        if (Math.random() > 0.15) { // 사복 함정 배치 확률 상향으로 난이도 극대화
            items.push({ x: lanes[tLane], y: -80, lane: tLane, isTrap: true, isObstacle: false, type: player.stage, pulse: 0 });
        }
    }
}

// ==========================================
// 🎨 [경계면 강화] 아이템 초정밀 입체 렌더링 함수 (블랙 아웃라인 추가)
// ==========================================
function applyContrastStyle() {
    ctx.strokeStyle = itemStroke;
    ctx.lineWidth = 3.5;
    ctx.shadowBlur = 10;
    ctx.shadowColor = "rgba(0, 0, 0, 0.4)";
}

function drawBlouse(x, y, isTrap) {
    ctx.save(); ctx.translate(x, y); applyContrastStyle();
    ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.moveTo(-20, -18); ctx.lineTo(20, -18); ctx.lineTo(24, 22); ctx.lineTo(-24, 22); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillRect(-30, -18, 10, 24); ctx.fillRect(20, -18, 10, 24); ctx.strokeRect(-30, -18, 10, 24); ctx.strokeRect(20, -18, 10, 24);
    
    if (!isTrap) {
        ctx.fillStyle = "#f8fafc";
        ctx.beginPath(); ctx.arc(-8, -15, 8, 0, Math.PI*2); ctx.arc(8, -15, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.fillStyle = "#064e3b"; ctx.fillRect(-30, 2, 10, 5); ctx.fillRect(20, 2, 10, 5);
    } else {
        ctx.fillStyle = "#cbd5e1"; ctx.beginPath(); ctx.moveTo(-10, -18); ctx.lineTo(0, -4); ctx.lineTo(10, -18); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
}

function drawRibbon(x, y, isTrap) {
    ctx.save(); ctx.translate(x, y); applyContrastStyle();
    if (!isTrap) {
        ctx.fillStyle = "#064e3b";
        ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(-24, -14); ctx.lineTo(-24, 10); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(24, -14); ctx.lineTo(24, 10); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.fillRect(-16, 4, 10, 22); ctx.fillRect(6, 4, 10, 22); ctx.strokeRect(-16, 4, 10, 22); ctx.strokeRect(6, 4, 10, 22);
        ctx.strokeStyle = "#2563eb"; ctx.lineWidth = 2.5; ctx.strokeRect(-22, -8, 44, 12);
        ctx.fillStyle = "#1e1b4b"; ctx.fillRect(-5, -6, 10, 10);
    } else {
        ctx.fillStyle = "#dc2626"; ctx.fillRect(-6, -18, 12, 32); ctx.strokeRect(-6, -18, 12, 32);
        ctx.beginPath(); ctx.moveTo(-6, 14); ctx.lineTo(0, 26); ctx.lineTo(6, 14); ctx.closePath(); ctx.fill(); ctx.stroke();
    }
    ctx.restore();
}

function drawVest(x, y, isTrap) {
    ctx.save(); ctx.translate(x, y); applyContrastStyle();
    ctx.fillStyle = "#4b5563"; ctx.fillRect(-22, -16, 44, 40); ctx.strokeRect(-22, -16, 44, 40);
    ctx.fillStyle = "#e2e8f0"; ctx.fillRect(-22, -16, 6, 16); ctx.fillRect(16, -16, 6, 16);
    
    if (!isTrap) {
        ctx.strokeStyle = "#fbbf24"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(-11, -16); ctx.lineTo(0, -3); ctx.lineTo(11, -16); ctx.stroke();
        ctx.fillStyle = "#10b981"; ctx.beginPath(); ctx.arc(-9, -2, 5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#fbbf24"; ctx.beginPath(); ctx.arc(-9, -2, 2, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

function drawSkirt(x, y, isTrap) {
    ctx.save(); ctx.translate(x, y); applyContrastStyle();
    if (!isTrap) {
        ctx.fillStyle = "#1e1b4b";
        ctx.beginPath(); ctx.moveTo(-18, -16); ctx.lineTo(18, -16); ctx.lineTo(26, 24); ctx.lineTo(-26, 24); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.strokeStyle = "#312e81"; ctx.lineWidth = 2.5;
        for (let i = -14; i <= 14; i += 4.5) {
            ctx.beginPath(); ctx.moveTo(i, -16); ctx.lineTo(i * 1.4, 24); ctx.stroke();
        }
    } else {
        ctx.fillStyle = "#6b7280"; ctx.fillRect(-18, -16, 16, 40); ctx.fillRect(2, -16, 16, 40); ctx.strokeRect(-18, -16, 16, 40); ctx.strokeRect(2, -16, 16, 40);
    }
    ctx.restore();
}

function drawJacket(x, y, isTrap) {
    ctx.save(); ctx.translate(x, y); applyContrastStyle();
    ctx.fillStyle = isTrap ? "#334155" : "#0f172a"; ctx.fillRect(-24, -20, 48, 44); ctx.strokeRect(-24, -20, 48, 44);
    ctx.strokeStyle = "#1e293b"; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(0, -20); ctx.lineTo(0, 12); ctx.stroke();
    
    if (!isTrap) {
        ctx.fillStyle = "#fbbf24"; ctx.shadowBlur = 6; ctx.shadowColor = "#fbbf24";
        ctx.beginPath(); 
        ctx.arc(-9, -4, 3.5, 0, Math.PI*2); ctx.arc(9, -4, 3.5, 0, Math.PI*2);
        ctx.arc(-9, 10, 3.5, 0, Math.PI*2); ctx.arc(9, 10, 3.5, 0, Math.PI*2);
        ctx.fill();
    }
    ctx.restore();
}

// ==========================================
// 🚧 [원작 초월] 거대화 및 디테일 강화된 장애물 3종
// ==========================================
function drawObstacle(x, y, obsType) {
    ctx.save(); ctx.translate(x, y);
    ctx.strokeStyle = "#000000"; ctx.lineWidth = 3.5;

    if (obsType === "giant_cart") {
        // 1. 거대한 대청소 카트 (바닥을 꽉 채우는 박진감)
        ctx.fillStyle = "#0284c7"; ctx.fillRect(-35, -10, 70, 40); ctx.strokeRect(-35, -10, 70, 40);
        ctx.fillStyle = "#facc15"; ctx.fillRect(-30, -35, 60, 25); ctx.strokeRect(-30, -35, 60, 25); // 쓰레기통 파츠
        // 돌출된 대걸레 자루들
        ctx.strokeStyle = "#64748b"; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(-20, -35); ctx.lineTo(-35, -60); ctx.moveTo(20, -35); ctx.lineTo(35, -60); ctx.stroke();
        // 바퀴
        ctx.fillStyle = "#1e293b";
        ctx.beginPath(); ctx.arc(-25, 35, 8, 0, Math.PI*2); ctx.arc(25, 35, 8, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    } else if (obsType === "stacked_desks") {
        // 2. 위태롭게 적재된 고층 교실 책상과 의자 더미 장애물
        ctx.fillStyle = "#b45309"; // 나무 책상 상판
        ctx.fillRect(-32, -25, 64, 12); ctx.strokeRect(-32, -25, 64, 12);
        ctx.fillRect(-26, 5, 52, 12); ctx.strokeRect(-26, 5, 52, 12);
        // 철제 다리 프레임 프레임워크
        ctx.strokeStyle = "#475569"; ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(-28, -13); ctx.lineTo(-28, 5); ctx.moveTo(28, -13); ctx.lineTo(28, 5);
        ctx.moveTo(-22, 17); ctx.lineTo(-22, 35); ctx.moveTo(22, 17); ctx.lineTo(22, 35);
        ctx.stroke();
        // 엎어진 양은 주전자 오브젝트 추가
        ctx.fillStyle = "#cbd5e1"; ctx.beginPath(); ctx.arc(0, -33, 9, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    } else if (obsType === "high_hurdle") {
        // 3. 체육대회용 거대 허들 (원작 서브웨이 서퍼 펜스 감성 완벽 이식)
        ctx.fillStyle = "#ef4444"; // 빨간색 지지대
        ctx.fillRect(-34, -40, 8, 75); ctx.fillRect(26, -40, 8, 75);
        ctx.strokeRect(-34, -40, 8, 75); ctx.strokeRect(26, -40, 8, 75);
        // 얼룩말 패턴의 상단 바 차단막
        let barGrad = ctx.createLinearGradient(-30, 0, 30, 0);
        barGrad.addColorStop(0, "#ffffff"); barGrad.addColorStop(0.3, "#000000");
        barGrad.addColorStop(0.6, "#ffffff"); barGrad.addColorStop(1, "#000000");
        ctx.fillStyle = barGrad; ctx.fillRect(-30, -40, 60, 14); ctx.strokeRect(-30, -40, 60, 14);
    }
    ctx.restore();
}

// ==========================================
// 👮‍♂️ 3. [피드백 적극 반영] 리얼 디테일 단속 선생님 그리기 함수
// ==========================================
function drawDetailedTeacher(y) {
    ctx.save();
    // 분노의 백그라운드 붉은 경고 오라장 광채
    let alertGrad = ctx.createLinearGradient(0, y, 0, y + 160);
    alertGrad.addColorStop(0, "rgba(239, 68, 68, 0.95)");
    alertGrad.addColorStop(1, "rgba(15, 23, 42, 0.9)");
    ctx.fillStyle = alertGrad; ctx.fillRect(0, y, 450, 160);

    // 단속 선생님 상반신 디테일 아트워크
    let centerX = 225 + Math.sin(gameTime * 0.4) * 15; // 플레이어를 향해 좌우로 섬뜩하게 무빙
    
    // 몸통 (어깨가 딱 벌어진 정장 자켓 스타일)
    ctx.fillStyle = "#1e293b"; ctx.strokeStyle = "#000000"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(centerX - 60, y + 120); ctx.lineTo(centerX - 45, y + 55);
    ctx.lineTo(centerX + 45, y + 55); ctx.lineTo(centerX + 60, y + 120); ctx.closePath(); ctx.fill(); ctx.stroke();

    // 붉고 무서운 분노의 얼굴 묘사
    ctx.fillStyle = "#fca5a5";
    ctx.beginPath(); ctx.arc(centerX, y + 30, 22, 0, Math.PI * 2); ctx.fill(); ctx.stroke();

    // 단속용 안경 묘사
    ctx.strokeStyle = "#000000"; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.arc(centerX - 8, y + 26, 6, 0, Math.PI * 2); ctx.arc(centerX + 8, y + 26, 6, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(centerX - 2, y + 26); ctx.lineTo(centerX + 2, y + 26); ctx.stroke();

    // 굳게 다문 무서운 입과 단속 호루라기
    ctx.fillStyle = "#94a3b8"; ctx.fillRect(centerX - 3, y + 38, 12, 7); ctx.strokeRect(centerX - 3, y + 38, 12, 7);

    // 앞으로 뻗은 위협적인 단속의 손길 손가락 묘사
    ctx.fillStyle = "#fca5a5";
    ctx.fillRect(centerX - 40, y + 60, 18, 25); ctx.strokeRect(centerX - 40, y + 60, 18, 25);
    ctx.fillRect(centerX + 22, y + 60, 18, 25); ctx.strokeRect(centerX + 22, y + 60, 18, 25);

    ctx.restore();
}

function update() {
    if (isGameOver) return;
    gameTime++;

    // 난이도 상승 곡선 대폭 가속화
    gameSpeed = 5.5 + (score / 1400);

    player.currentX += (player.targetX - player.currentX) * 0.24;
    player.animFrame += 0.18;

    if (!player.isGrounded) {
        player.yOffset += player.vy;
        player.vy += gravity;
        if (player.yOffset >= 0) {
            player.yOffset = 0;
            player.vy = 0;
            player.isGrounded = true;
        }
    }

    spawnTimer++;
    // 스코어가 올라갈수록 장애물이 숨 쉴 틈 없이 빽빽하게 쏟아집니다
    let adaptiveSpawnInterval = Math.max(34, 68 - (score / 500));
    if (spawnTimer > adaptiveSpawnInterval) { spawn(); spawnTimer = 0; }

    for (let i = items.length - 1; i >= 0; i--) {
        items[i].y += gameSpeed;

        if (items[i].y > 520 && items[i].y < 580 && items[i].lane === player.lane) {
            if (items[i].isObstacle) {
                if (player.yOffset > -30) { // 고공 점프 시 거대 장애물 위를 안전하게 패스 가능
                    teacherDistance -= 1.6; 
                    score = Math.max(0, score - 200);
                    items.splice(i, 1);
                }
            } else {
                if (!items[i].isTrap) {
                    player.stage++;
                    score += 350;
                    teacherDistance = Math.min(5.0, teacherDistance + 1.0);
                } else {
                    if (player.stage > 0) player.stage--; 
                    teacherDistance -= 2.0;
                }
                items.splice(i, 1);
            }
            continue;
        }
        if (items[i].y > 710) items.splice(i, 1);
    }

    if (teacherDistance <= 0) isGameOver = true;
}

function draw() {
    ctx.clearRect(0, 0, 450, 700);

    // ==========================================
    // ☀️ 1. [대비 극대화] 고대비 하이라이트 복도 아트워크
    // ==========================================
    ctx.fillStyle = "#1e293b"; ctx.fillRect(0, 0, 450, 700); // 심해 딥블루 벽면
    ctx.fillStyle = "#064e3b"; ctx.fillRect(0, 0, 100, 700); ctx.fillRect(350, 0, 100, 700); // 짙은 녹색 하단 벽
    
    // [아이템 시인성 확보의 핵심] 교복 백색/남색과 완벽히 격리되는 '고급 살구빛 오크 바닥 타일' 매핑
    let floorGrad = ctx.createLinearGradient(0, 180, 0, 700);
    floorGrad.addColorStop(0, "#fed7aa"); floorGrad.addColorStop(1, "#f97316");
    ctx.fillStyle = floorGrad; ctx.fillRect(100, 180, 250, 520);

    // 창문 햇살 조명 빔
    ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
    ctx.beginPath(); ctx.moveTo(0, 200); ctx.lineTo(280, 700); ctx.lineTo(160, 700); ctx.lineTo(0, 310); ctx.closePath(); ctx.fill();

    // 오렌지 스틸 사물함 선명도 업그레이드
    ctx.fillStyle = "#ea580c"; ctx.strokeStyle = "#000000"; ctx.lineWidth = 2;
    for(let y = 180; y < 700; y += 80) {
        ctx.fillRect(10, y, 20, 55); ctx.strokeRect(10, y, 20, 55);
        ctx.fillRect(420, y, 20, 55); ctx.strokeRect(420, y, 20, 55);
    }

    // 3라인 가이드 런 트랙 궤적선 (서브웨이 서퍼 원근 투시각 완벽 매칭)
    ctx.strokeStyle = "#16a34a"; ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(150, 180); ctx.lineTo(120, 700);
    ctx.moveTo(300, 180); ctx.lineTo(330, 700);
    ctx.stroke();

    // ==========================================
    // 💎 2. 드롭 아이템 & 장애물 그리기 (가이드 완전 소멸 상태)
    // ==========================================
    items.forEach(item => {
        if (item.isObstacle) {
            drawObstacle(item.x, item.y, item.obsType);
        } else {
            // 철저히 기획된 전용 디자인 윤곽선으로 출력
            if (item.type === 0) drawBlouse(item.x, item.y, item.isTrap);
            else if (item.type === 1) drawRibbon(item.x, item.y, item.isTrap);
            else if (item.type === 2) drawVest(item.x, item.y, item.isTrap);
            else if (item.type === 3) drawSkirt(item.x, item.y, item.isTrap);
            else if (item.type === 4) drawJacket(item.x, item.y, item.isTrap);
        }
    });

    // ==========================================
    // 🏃‍♀️ 4. 플레이어 캐릭터 (포니테일 찰랑임 물리 묘사 + 점프 대응)
    // ==========================================
    let pX = player.currentX;
    let pY = 540 + player.yOffset; 
    let hairSway = Math.sin(player.animFrame) * 8;

    // 아바타 테두리 선명도 확보
    ctx.strokeStyle = "#000000"; ctx.lineWidth = 3;

    ctx.fillStyle = "#ffedd5"; ctx.beginPath(); ctx.arc(pX, pY - 35, 15, 0, Math.PI*2); ctx.fill(); ctx.stroke(); // 두상
    
    // 포니테일 묶은 머리 애니메이션 결속 구조
    ctx.fillStyle = "#0f172a"; ctx.beginPath(); ctx.arc(pX, pY - 44, 7, 0, Math.PI*2); ctx.fill(); 
    ctx.beginPath(); ctx.moveTo(pX, pY - 44); ctx.quadraticCurveTo(pX + hairSway, pY - 22, pX + hairSway * 1.4, pY - 4);
    ctx.lineTo(pX - 6, pY - 44); ctx.closePath(); ctx.fillStyle = "#1e293b"; ctx.fill(); ctx.stroke();

    // 실시간 파츠 교체 레이어드 아바타 스킨
    if (player.stage === 0) {
        ctx.fillStyle = "#cbd5e1"; ctx.fillRect(pX-16, pY-15, 32, 42); ctx.strokeRect(pX-16, pY-15, 32, 42); // 위반 사복 티룩
        ctx.fillStyle = "#475569"; ctx.fillRect(pX-14, pY+27, 28, 25); ctx.strokeRect(pX-14, pY+27, 28, 25); // 위반 추리닝
    } else {
        if (player.stage >= 1) { ctx.fillStyle = "#ffffff"; ctx.fillRect(pX-16, pY-15, 32, 42); ctx.strokeRect(pX-16, pY-15, 32, 42); } 
        if (player.stage >= 2) { ctx.fillStyle = "#064e3b"; ctx.beginPath(); ctx.arc(pX, pY-6, 6, 0, Math.PI*2); ctx.fill(); ctx.stroke(); } 
        if (player.stage >= 3) { ctx.fillStyle = "#4b5563"; ctx.fillRect(pX-16, pY-10, 32, 37); ctx.strokeRect(pX-16, pY-10, 32, 37); } 
        if (player.stage >= 4) { ctx.fillStyle = "#1e1b4b"; ctx.fillRect(pX-18, pY+27, 36, 24); ctx.strokeRect(pX-18, pY+27, 36, 24); } 
        if (player.stage >= 5) { ctx.fillStyle = "#0f172a"; ctx.fillRect(pX-18, pY-15, 36, 44); ctx.strokeRect(pX-18, pY-15, 36, 44); } 
    }

    // ==========================================
    // 👮‍♂️ 5. [피드백 완벽 반영] 실시간 애니메이팅 추격 선생님 활성화
    // ==========================================
    let teacherTopY = 700 - (5.0 - teacherDistance) * 38;
    drawDetailedTeacher(teacherTopY);
    
    if (teacherDistance <= 2.8 && Math.floor(gameTime / 6) % 2 === 0) {
        ctx.fillStyle = "#facc15"; ctx.font = "bold 23px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("🚨 학칙 위반 검거 개시!!! 🚨", pX, teacherTopY - 25);
    }

    // ==========================================
    // 📊 6. 상단 프리미엄 대시보드 및 리얼 착용 게이지 UI
    // ==========================================
    ctx.fillStyle = "rgba(15, 23, 42, 0.95)"; ctx.fillRect(15, 15, 420, 100);
    ctx.strokeStyle = "#10b981"; ctx.lineWidth = 3; ctx.strokeRect(15, 15, 420, 100);
    
    ctx.fillStyle = "#ffffff"; ctx.font = "bold 13px sans-serif"; ctx.textAlign = "left";
    ctx.fillText("🏃‍♀️ 플레이어: 사복 등교 시작 -> 정복 전환 미션 진행 중", 30, 42);
    
    ctx.fillStyle = "#4ade80"; ctx.font = "bold 18px monospace"; ctx.textAlign = "right";
    ctx.fillText("SCORE: " + score, 415, 42);

    // [스펙트럼 게이지 바 마스터피스 설계]
    ctx.fillStyle = "#1e293b"; ctx.fillRect(30, 65, 390, 22); 
    let gaugeWidth = (player.stage / 5) * 390;
    
    let gaugeGrad = ctx.createLinearGradient(30, 0, 420, 0);
    gaugeGrad.addColorStop(0, "#10b981"); gaugeGrad.addColorStop(1, "#059669");
    ctx.fillStyle = gaugeGrad; ctx.fillRect(30, 65, gaugeWidth, 22);
    
    ctx.strokeStyle = "rgba(15, 23, 42, 0.6)"; ctx.lineWidth = 2;
    for(let g = 1; g < 5; g++) {
        ctx.beginPath(); ctx.moveTo(30 + (g * 78), 65); ctx.lineTo(30 + (g * 78), 87); ctx.stroke();
    }
    
    ctx.fillStyle = "#ffffff"; ctx.font = "bold 11px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(`이화여고 정복 착용도: ${player.stage * 20}% 완료`, 225, 81);

    // 종료 조건 핸들러 화면 출력
    if (isGameOver) {
        ctx.fillStyle = "rgba(11, 15, 25, 0.96)"; ctx.fillRect(0, 0, 450, 700);
        ctx.fillStyle = "#ef4444"; ctx.font = "bold 30px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("🚨 교무실행 반성문 엔딩 🚨", 225, 310);
        ctx.fillStyle = "#ffffff"; ctx.font = "15px sans-serif";
        ctx.fillText("거대 장애물에 걸렸거나 사복 함정에 속아 단속되었습니다.", 225, 360);
        ctx.fillStyle = "#64748b"; ctx.fillText("다시 질주하려면 키보드 F5를 누르세요!", 225, 400);
    }
    if (player.stage >= 5) {
        ctx.fillStyle = "rgba(4, 120, 87, 0.98)"; ctx.fillRect(0, 0, 450, 700);
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 34px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("🎉 복장 단속 돌파 대성공! 🎉", 225, 310);
        ctx.font = "16px sans-serif"; ctx.fillStyle = "#a7f3d0";
        ctx.fillText("완벽한 정복 세트를 갖추어 입고 품격 있게 교실 진입!", 225, 365);
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
