# ewharunners0<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 이화 러너즈</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 400px;
            height: 600px;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        canvas {
            background: linear-gradient(to bottom, #2c3e50, #bdc3c7);
            display: block;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            pointer-events: none;
            width: 360px;
        }
        .clear-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,128,0,0.9);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            font-size: 24px;
            display: none;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <canvas id="gameCanvas" width="400" height="600"></canvas>
    <div id="ui">
        <div>🏃‍♀️ 상태: <span id="status" style="color:#ff4757; font-weight:bold;">사복 차림 (묶은 머리)</span></div>
        <div style="margin-top: 5px;">📋 수집 완료: <span id="gear">⭕ 없음</span></div>
        <div style="margin-top: 5px; color:#ff7f50;">🎯 다음 목표: <span id="nextGoal">1. 이화 블라우스</span></div>
        <div style="margin-top: 5px; color:#edf2f7;">👮‍♂️ 선생님과의 거리: <span id="distance">5m</span></div>
    </div>
    <div id="clearScreen" class="clear-msg">
        🎉 등교 성공! 🎉<br>
        <span style="font-size:16px;">완벽한 이화여고 정복 완성!<br>복장 단속을 피해 교실에 골인했습니다.</span>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 게임 상태 변수
let playerLane = 1; // 0: 왼쪽, 1: 가운데, 2: 오른쪽
const laneX = [80, 200, 320];
let playerY = 500;
let teacherDistance = 5; // 마지노선 거리 (0되면 잡힘)
let currentStage = 0; // 0:사복 ~ 5:완전정복
let isGameOver = false;

// 의류 데이터 정의 (이화교복 디자인 디테일 100% 반영)
const stageInfo = [
    { name: "이화 블라우스", desc: "흰색 + 소매 끝 녹색 체크", color: "#ffffff", trap: "일반 흰 티", trapColor: "#e2e8f0" },
    { name: "이화 리본", desc: "녹색/남색 배색 체크 리본", color: "#1e3a8a", trap: "사복 넥타이", trapColor: "#7f1d1d" },
    { name: "이화 니트 조끼", desc: "진회색 + 노란줄 + 꽃 로고", color: "#374151", trap: "로고 없는 조끼", trapColor: "#4b5563" },
    { name: "이화 주름치마", desc: "짙은 남색 플리츠 스커트", color: "#1e1b4b", trap: "회색 추리닝 바지", trapColor: "#9ca3af" },
    { name: "이화 자켓", desc: "짙은 남색 + 금장 단추 4개", color: "#0f172a", trap: "남색 사복 겉옷", trapColor: "#1e293b" }
];

let items = [];
let spawnTimer = 0;

// 키보드 조작 이벤트 (A/D 또는 방향키)
window.addEventListener('keydown', e => {
    if (isGameOver) return;
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
        if (playerLane > 0) playerLane--;
    }
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
        if (playerLane < 2) playerLane++;
    }
});

function spawnItem() {
    if (currentStage >= 5) return;
    
    // 무작위 레인에 진짜 교복과 가짜 사복 함정 생성
    let targetLane = Math.floor(Math.random() * 3);
    let trapLane = (targetLane + Math.floor(Math.random() * 2) + 1) % 3;

    // 진짜 교복 아이템 추가
    items.push({
        lane: targetLane,
        y: -50,
        isTrap: false,
        name: stageInfo[currentStage].name,
        color: stageInfo[currentStage].color
    });

    // 헷갈리는 사복 함정 아이템 추가
    items.push({
        lane: trapLane,
        y: -50,
        isTrap: true,
        name: stageInfo[currentStage].trap,
        color: stageInfo[currentStage].trapColor
    });
}

function update() {
    if (isGameOver) return;

    spawnTimer++;
    if (spawnTimer > 100) {
        spawnItem();
        spawnTimer = 0;
    }

    // 아이템 이동 및 충돌 판정
    for (let i = items.length - 1; i >= 0; i--) {
        items[i].y += 4; // 아래로 떨어지는 스피드

        // 플레이어 캐릭터와 부딪혔을 때 (자석 없이 오직 직접 닿아야 함)
        if (items[i].lane === playerLane && items[i].y > playerY - 30 && items[i].y < playerY + 30) {
            if (!items[i].isTrap) {
                // 진짜를 순서대로 먹었을 때 단계 상승!
                currentStage++;
                if (currentStage < 5) teacherDistance = Math.min(5, teacherDistance + 1); // 선생님 따돌림
            } else {
                // 사복 함정을 건드렸을 때 복합 페널티 (단계 하락 + 선생님 바짝 추격)
                if (currentStage > 0) currentStage--;
                teacherDistance -= 2;
            }
            items.splice(i, 1);
            updateUI();
            continue;
        }

        // 화면 밖으로 나간 아이템 제거
        if (items[i].y > 600) {
            items.splice(i, 1);
        }
    }

    // 선생님 단속 거리 조건 확인
    if (teacherDistance <= 0) {
        isGameOver = true;
        alert("복장 불량 적발! 선생님께 잡혔습니다. 다시 시작하려면 새로고침(F5)을 누르세요!");
    }
    if (currentStage === 5) {
        isGameOver = true;
        document.getElementById('clearScreen').style.display = 'block';
    }
}

function updateUI() {
    const statusEl = document.getElementById('status');
    const gearEl = document.getElementById('gear');
    const nextGoalEl = document.getElementById('nextGoal');
    const distanceEl = document.getElementById('distance');

    distanceEl.innerText = teacherDistance + "m";

    if (currentStage === 0) {
        statusEl.innerText = "사복 차림 (묶은 머리)";
        statusEl.style.color = "#ff4757";
        gearEl.innerText = "⭕ 없음";
    } else {
        statusEl.innerText = "교복 장착 중...";
        statusEl.style.color = "#2ed573";
        let collected = [];
        for (let i = 0; i < currentStage; i++) collected.push(stageInfo[i].name);
        gearEl.innerText = "👚 " + collected.join(", ");
    }

    if (currentStage < 5) {
        nextGoalEl.innerText = `${currentStage + 1}. ${stageInfo[currentStage].name} (${stageInfo[currentStage].desc})`;
    } else {
        nextGoalEl.innerText = "🏁 전복 완성! 등교 성공!";
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. 3개 라인 도로 그리기
    ctx.strokeStyle = "rgba(255,255,255,0.3)";
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(140, 0); ctx.lineTo(140, 600);
    ctx.moveTo(260, 0); ctx.lineTo(260, 600);
    ctx.stroke();

    // 2. 떨어지는 의류 아이템 그리기 (3D 입체 효과 대용 상자 처리)
    items.forEach(item => {
        ctx.fillStyle = item.color;
        ctx.fillRect(laneX[item.lane] - 30, item.y - 20, 60, 40);
        ctx.strokeStyle = item.isTrap ? "#ff4757" : "#ffffff";
        ctx.lineWidth = 2;
        ctx.strokeRect(laneX[item.lane] - 30, item.y - 20, 60, 40);

        // 아이템 이름 표시
        ctx.fillStyle = "#ffffff";
        ctx.font = "10px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(item.name, laneX[item.lane], item.y + 5);
    });

    // 3. 플레이어 그리기 (묶은 머리를 찰랑이며 달리는 3D 백뷰 연출 레이아웃)
    ctx.fillStyle = "#ff7f50";
    ctx.beginPath();
    ctx.arc(laneX[playerLane], playerY, 25, 0, Math.PI * 2);
    ctx.fill();

    // 묶은 머리(포니테일) 연출 포인트
    ctx.fillStyle = "#4a3728";
    ctx.beginPath();
    ctx.arc(laneX[playerLane], playerY - 20, 8, 0, Math.PI * 2);
    ctx.fill();

    // 현재 입은 교복 색상 반영
    if (currentStage > 0) {
        ctx.fillStyle = stageInfo[currentStage - 1].color;
        ctx.fillRect(laneX[playerLane] - 15, playerY - 10, 30, 25);
    }

    // 4. 뒤에서 쫓아오는 복장 단속 선생님 그리기 (거리가 가까워지면 위로 올라옴)
    let teacherY = 600 - (5 - teacherDistance) * 20;
    ctx.fillStyle = "#ff4757";
    ctx.fillRect(0, teacherY, 400, 100);
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 16px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("👮‍♂️ 복장 단속 선생님 구역", 200, teacherY + 30);
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
