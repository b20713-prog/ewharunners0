<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이화 러너즈: 지상 최강의 역작</title>
    <style>
        body { margin: 0; background: #f0fdf4; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; }
        #gameCanvas { border: 6px solid #16a34a; box-shadow: 0 25px 50px -12px rgba(22, 163, 74, 0.3); border-radius: 20px; }
        .tip { color: #166534; margin-top: 15px; font-size: 14px; font-weight: bold; letter-spacing: 1px; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="400" height="650"></canvas>
<div class="tip">
    ☀️ 화창한 아침! 복장 단속을 피해 활기차게 등교하세요! ☀️<br>
    🎮 [ A / D ] 또는 [ 좌우 방향키 ]로 이동 | [ Spacebar ] 또는 [ W ]로 점프!
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// 3라인 및 오락실 스타일 물리 엔진 변수
const lanes = [80, 200, 320];
let player = { lane: 1, currentX: 200, targetX: 200, yOffset: 0, vy: 0, isGrounded: true, stage: 0, animFrame: 0 };
let items = [];
let spawnTimer = 0;
let teacherDistance = 5; 
let score = 0;
let isGameOver = false;
let gameTime = 0;
let gameSpeed = 5.2; 

const gravity = 0.65;

// 이화여고 교복 5종 마스터 북 (더욱 선명하고 다채로운 시그니처 색감 튜닝)
const outfitBook = [
    { color: "#FFFFFF", line: "#10b981", trapColor: "#e2e8f0" }, // 1. 블라우스 (순백색 & 에메랄드 그린 소매 포인트)
    { color: "#064e3b", line: "#2563eb", trapColor: "#dc2626" }, // 2. 체크리본 (딥 포레스트 그린 & 로열 블루 배색)
    { color: "#4b5563", line: "#fbbf24", trapColor: "#6b7280" }, // 3. 니트조끼 (차콜 그레이 & 산뜻한 레몬 옐로우 골드 선)
    { color: "#1e1b4b", line: "#4338ca", trapColor: "#94a3b8" }, // 4. 주름치마 (미드나잇 인디고 블루)
    { color: "#0f172a", line: "#fbbf24", trapColor: "#334155" }  // 5. 자켓 (노블 블랙네이비 & 빛나는 금장 단추)
];

window.addEventListener("keydown", e => {
    if (isGameOver) return;
    
    if ((e.key === "ArrowLeft" || e.key === "a" || e.key === "A") && player.lane > 0) player.lane--;
    if ((e.key === "ArrowRight" || e.key === "d" || e.key === "D") && player.lane < 2) player.lane++;
    player.targetX = lanes[player.lane];

    if ((e.key === "ArrowUp" || e.key === "w" || e.key === "W" || e.key === " ") && player.isGrounded) {
        player.vy = -12.0;
        player.isGrounded = false;
    }
});

function spawn() {
    if (player.stage >= 5) return;
    let rLane = Math.floor(Math.random() * 3);
    
    // 서브웨이 서퍼 감성의 다채로운 장애물 배치 확률 (40%)
    if (Math.random() < 0.40) {
        let obsTypes = ["sign", "books", "mop"];
        items.push({ x: lanes[rLane], y: -60, lane: rLane, isObstacle: true, obsType: obsTypes[Math.floor(Math.random() * obsTypes.length)] });
    } else {
        let tLane = (rLane + Math.floor(Math.random() * 2) + 1) % 3;
        items.push({ x: lanes[rLane], y: -60, lane: rLane, isTrap: false, isObstacle: false, type: player.stage, pulse: 0 });
        if (Math.random() > 0.20) {
            items.push({ x: lanes[tLane], y: -60, lane: tLane, isTrap: true, isObstacle: false, type: player.stage, pulse: 0 });
        }
    }
}

// ==========================================
// 🎨 아이템 초정밀 입체 디테일 그래픽 함수
// ==========================================
function drawBlouse(x, y, isTrap) {
    ctx.save(); ctx.translate(x, y);
    ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.moveTo(-18, -15); ctx.lineTo(18, -15); ctx.lineTo(22, 20); ctx.lineTo(-22, 20); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = "#cbd5e1"; ctx.stroke();
    ctx.fillRect(-27, -15, 9, 22); ctx.fillRect(18, -15, 9, 22);
    
    if (!isTrap) {
        ctx.fillStyle = "#f8fafc";
        ctx.beginPath(); ctx.arc(-7, -13, 7, 0, Math.PI*2); ctx.arc(7, -13, 7, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "#10b981"; ctx.lineWidth = 1.5; ctx.stroke(); // 이화 녹색 카라선
        ctx.fillStyle = "#064e3b"; ctx.fillRect(-27, 3, 9, 5); ctx.fillRect(18, 3, 9, 5); // 소매 체크
    } else {
        ctx.fillStyle = "#f1f5f9"; // 함정 사복 브이넥
        ctx.beginPath(); ctx.moveTo(-9, -15); ctx.lineTo(0, -3); ctx.lineTo(9, -15); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
}

function drawRibbon(x, y, isTrap) {
    ctx.save(); ctx.translate(x, y);
    if (!isTrap) {
        ctx.fillStyle = "#064e3b"; 
        ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(-22, -12); ctx.lineTo(-22, 8); ctx.closePath(); ctx.fill();
        ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(22, -12); ctx.lineTo(22, 8); ctx.closePath(); ctx.fill();
        ctx.fillRect(-14, 2, 9, 20); ctx.fillRect(5, 2, 9, 20);
        ctx.strokeStyle = "#2563eb"; ctx.lineWidth = 2; ctx.strokeRect(-19, -7, 38, 10); // 주위 남색 레이스선
        ctx.fillStyle = "#1e1b4b"; ctx.fillRect(-4, -5, 8, 8);
    } else {
        ctx.fillStyle = "#b91c1c"; // 함정 빨간 넥타이
        ctx.fillRect(-5, -15, 10, 30);
        ctx.beginPath(); ctx.moveTo(-5, 15); ctx.lineTo(0, 25); ctx.lineTo(5, 15); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
}

function drawVest(x, y, isTrap) {
    ctx.save(); ctx.translate(x, y);
    ctx.fillStyle = "#4b5563"; 
    ctx.fillRect(-20, -15, 40, 38);
    ctx.fillStyle = "#e2e8f0"; ctx.fillRect(-20, -15, 5, 14); ctx.fillRect(15, -15, 5, 14);
    
    if (!isTrap) {
        ctx.strokeStyle = "#fbbf24"; ctx.lineWidth = 2.5; // 노란 마감줄
        ctx.beginPath(); ctx.moveTo(-10, -15); ctx.lineTo(0, -3); ctx.lineTo(10, -15); ctx.stroke();
        // 가슴팍 선명한 나뭇잎/꽃 엠블럼 로고
        ctx.fillStyle = "#10b981"; ctx.beginPath(); ctx.arc(-8, -2, 4.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#fbbf24"; ctx.beginPath(); ctx.arc(-8, -2, 1.5, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

function drawSkirt(x, y, isTrap) {
    ctx.save(); ctx.translate(x, y);
    if (!isTrap) {
        ctx.fillStyle = "#1e1b4b"; 
        ctx.beginPath(); ctx.moveTo(-17, -15); ctx.lineTo(17, -15); ctx.lineTo(25, 22); ctx.lineTo(-24, 22); ctx.closePath(); ctx.fill();
        ctx.strokeStyle = "#312e81"; ctx.lineWidth = 2;
        for (let i = -12; i <= 12; i += 4) {
            ctx.beginPath(); ctx.moveTo(i, -15); ctx.lineTo(i * 1.3, 22); ctx.stroke(); // 선명한 테일러드 주름선
        }
    } else {
        ctx.fillStyle = "#6b7280"; // 함정 통넓은 츄리닝
        ctx.fillRect(-17, -15, 15, 38); ctx.fillRect(2, -15, 15, 38);
    }
    ctx.restore();
}

function drawJacket(x, y, isTrap) {
    ctx.save(); ctx.translate(x, y);
    ctx.fillStyle = isTrap ? "#334155" : "#0f172a"; 
    ctx.fillRect(-22, -18, 44, 42);
    ctx.strokeStyle = "#1e293b"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, -18); ctx.lineTo(0, 10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-22, -8); ctx.lineTo(0, 2); ctx.lineTo(22, -8); ctx.stroke();
    
    if (!isTrap) {
        ctx.fillStyle = "#fbbf24"; // 입체적인 리얼 오각 금장단추 이펙트
        ctx.shadowBlur = 6; ctx.shadowColor = "#fbbf24";
        ctx.beginPath(); 
        ctx.arc(-8, -3, 3, 0, Math.PI*2); ctx.arc(8, -3, 3, 0, Math.PI*2);
        ctx.arc(-8, 9, 3, 0, Math.PI*2); ctx.arc(8, 9, 3, 0, Math.PI*2);
        ctx.fill();
    }
    ctx.restore();
}

// ==========================================
// 🚧 다채롭고 화려해진 방해 장애물 3종 세트
// ==========================================
function drawObstacle(x, y, obsType) {
    ctx.save(); ctx.translate(x, y);
    if (obsType === "sign") {
        // 1. 노란색 '복도 청소 중' 미끄럼방지 표지판
        ctx.fillStyle = "#f59e0b";
        ctx.beginPath(); ctx.moveTo(0, -25); ctx.lineTo(-18, 20); ctx.lineTo(18, 20); ctx.closePath(); ctx.fill();
        ctx.strokeStyle = "#b45309"; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = "#000"; ctx.font = "bold 13px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("⚠️", 0, 12);
    } else if (obsType === "books") {
        // 2. 바닥에 흩어진 알록달록 무거운 서적 교과서 더미
        ctx.fillStyle = "#ef4444"; ctx.fillRect(-22, 5, 44, 12);
        ctx.fillStyle = "#3b82f6"; ctx.fillRect(-18, -4, 36, 11);
        ctx.fillStyle = "#10b981"; ctx.fillRect(-20, -12, 40, 10);
        ctx.fillStyle = "#fff"; ctx.fillRect(-14, -12, 28, 2);
    } else if (obsType === "mop") {
        // 3. 신규 추가: 복도에 비스듬히 넘어지려는 대걸레와 양동이
        ctx.fillStyle = "#0284c7"; ctx.beginPath(); ctx.arc(0, 10, 14, 0, Math.PI, true); ctx.fill(); // 양동이
        ctx.strokeStyle = "#94a3b8"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(-10, 10); ctx.lineTo(15, -25); ctx.stroke(); // 자루
        ctx.fillStyle = "#f8fafc"; ctx.fillRect(10, -25, 10, 8); // 걸레 걸이
    }
    ctx.restore();
}

function update() {
    if (isGameOver) return;
    gameTime++;

    gameSpeed = 5.2 + (score / 1800);

    player.currentX += (player.targetX - player.currentX) * 0.24;
    player.animFrame += 0.18;

    // 점프 물리 엔진식 가속도 연산
    if (!player.isGrounded) {
        player.yOffset += player.vy;
        player.vy += gravity;
        if (player.yOffset >= 0) {
            player.yOffset = 0;
            player.vy = 0;
            player.isGrounded = true;
        }
    }

    spawnTimer++;
    if (spawnTimer > Math.max(40, 72 - (score / 450))) { spawn(); spawnTimer = 0; }

    for (let i = items.length - 1; i >= 0; i--) {
        items[i].y += gameSpeed;

        if (items[i].y > 480 && items[i].y < 540 && items[i].lane === player.lane) {
            if (items[i].isObstacle) {
                if (player.yOffset > -22) { // 바닥 상태일때만 장애물 타격 적용 (점프 시 피해감)
                    teacherDistance -= 1.5; 
                    score = Math.max(0, score - 150);
                    items.splice(i, 1);
                }
            } else {
                if (!items[i].isTrap) {
                    player.stage++;
                    score += 300;
                    teacherDistance = Math.min(5, teacherDistance + 1);
                } else {
                    if (player.stage > 0) player.stage--; 
                    teacherDistance -= 2.0;
                }
                items.splice(i, 1);
            }
            continue;
        }
        if (items[i].y > 660) items.splice(i, 1);
    }

    if (teacherDistance <= 0) isGameOver = true;
}

function draw() {
    ctx.clearRect(0, 0, 400, 650);

    // ==========================================
    // ☀️ 1. 화창하고 밝은 아침 등교길 분위기 비주얼 아트워크
    // ==========================================
    // 벽면 (파스텔톤 연녹색 & 아이보리 학교 벽)
    ctx.fillStyle = "#fef08a"; ctx.fillRect(0, 0, 400, 650);
    ctx.fillStyle = "#a7f3d0"; ctx.fillRect(0, 0, 90, 650); ctx.fillRect(310, 0, 90, 650); 
    
    // 복도 바닥 (화창한 햇살이 반사되는 밝은 베이지 원근 우드 타일)
    let floorGrad = ctx.createLinearGradient(0, 180, 0, 650);
    floorGrad.addColorStop(0, "#e2e8f0"); floorGrad.addColorStop(1, "#ffedd5");
    ctx.fillStyle = floorGrad; ctx.fillRect(90, 180, 220, 470); 

    // [디테일 강화] 복도 창문에서 들어오는 따스한 대각선 햇살 하이라이트 효과
    ctx.fillStyle = "rgba(255, 255, 255, 0.12)";
    ctx.beginPath(); ctx.moveTo(0, 200); ctx.lineTo(250, 650); ctx.lineTo(150, 650); ctx.lineTo(0, 300); ctx.closePath(); ctx.fill();

    // 양측 교실 문 및 사물함 가이드 입체 배치
    ctx.fillStyle = "#f97316"; // 오렌지 사물함 포인트로 다채로운 색감 가미
    for(let y = 180; y < 650; y += 75) {
        ctx.fillRect(8, y, 16, 50); ctx.fillRect(376, y, 16, 50);
    }

    // 3라인 기입 투시선 트랙
    ctx.strokeStyle = "rgba(22, 163, 74, 0.25)"; ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(135, 180); ctx.lineTo(110, 650);
    ctx.moveTo(265, 180); ctx.lineTo(290, 650);
    ctx.stroke();

    // ==========================================
    // 💎 2. 드롭 아이템 및 장애물 구현 (텍스트 완벽 차단)
    // ==========================================
    items.forEach(item => {
        if (item.isObstacle) {
            drawObstacle(item.x, item.y, item.obsType);
        } else {
            if (item.type === 0) drawBlouse(item.x, item.y, item.isTrap);
            else if (item.type === 1) drawRibbon(item.x, item.y, item.isTrap);
            else if (item.type === 2) drawVest(item.x, item.y, item.isTrap);
            else if (item.type === 3) drawSkirt(item.x, item.y, item.isTrap);
            else if (item.type === 4) drawJacket(item.x, item.y, item.isTrap);
        }
    });

    // ==========================================
    // 🏃‍♀️ 3. 플레이어 캐릭터 (역동적 포니테일 흔들림 애니메이션)
    // ==========================================
    let pX = player.currentX;
    let pY = 500 + player.yOffset; 
    let hairSway = Math.sin(player.animFrame) * 7;

    ctx.fillStyle = "#ffedd5"; ctx.beginPath(); ctx.arc(pX, pY - 35, 14, 0, Math.PI*2); ctx.fill(); // 학생 얼굴 두상
    
    // [기획 조건] 뛰어야 하니까 뒤로 리드미컬하게 묶은 포니테일 꼬리머리 묘사
    ctx.fillStyle = "#1e293b"; ctx.beginPath(); ctx.arc(pX, pY - 42, 6, 0, Math.PI*2); ctx.fill(); 
    ctx.beginPath(); ctx.moveTo(pX, pY - 42); ctx.quadraticCurveTo(pX + hairSway, pY - 22, pX + hairSway * 1.3, pY - 6);
    ctx.lineTo(pX - 5, pY - 42); ctx.closePath(); ctx.fillStyle = "#334155"; ctx.fill();

    // 시작 조건: 무조건 사복 차림 스타트 -> 실시간 교복 누적 레이어링 시스템
    if (player.stage === 0) {
        ctx.fillStyle = "#94a3b8"; ctx.fillRect(pX-15, pY-15, 30, 40); // 사복 회색빛 상의
        ctx.fillStyle = "#475569"; ctx.fillRect(pX-13, pY+25, 26, 25); // 사복 추리닝 바지
    } else {
        if (player.stage >= 1) { ctx.fillStyle = "#ffffff"; ctx.fillRect(pX-15, pY-15, 30, 40); } // 블라우스
        if (player.stage >= 2) { ctx.fillStyle = "#064e3b"; ctx.beginPath(); ctx.arc(pX, pY-7, 5, 0, Math.PI*2); ctx.fill(); } // 체크리본
        if (player.stage >= 3) { ctx.fillStyle = "#4b5563"; ctx.fillRect(pX-15, pY-10, 30, 35); } // 니트조끼
        if (player.stage >= 4) { ctx.fillStyle = "#1e1b4b"; ctx.fillRect(pX-17, pY+25, 34, 22); } // 주름치마
        if (player.stage >= 5) { ctx.fillStyle = "#0f172a"; ctx.fillRect(pX-17, pY-15, 34, 42); } // 최종 마이자켓 완벽 장착
    }

    // ==========================================
    // 👮‍♂️ 4. 복장 단속 선생님 추격 메커니즘 연출
    // ==========================================
    let teacherY = 650 - (5 - teacherDistance) * 35;
    ctx.fillStyle = "rgba(239, 68, 68, 0.88)"; // 다가올수록 선명해지는 레드 존
    ctx.fillRect(0, teacherY, 400, 150);
    
    if (teacherDistance <= 3 && Math.floor(gameTime / 8) % 2 === 0) {
        ctx.fillStyle = "#f59e0b"; ctx.font = "bold 22px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("📢 복장 단속 대기!!!", pX, teacherY - 20);
    }
    ctx.fillStyle = "#ffffff"; ctx.font = "bold 13px sans-serif"; ctx.textAlign = "center";
    ctx.fillText("👮‍♂️ 학생주임 선생님 거리 단속 선 (추격 강도: " + teacherDistance.toFixed(1) + "m)", 200, teacherY + 35);

    // ==========================================
    // 📊 5. 탑 대시보드 및 [신규] 올바른 교복 착용 게이지 표시 UI
    // ==========================================
    ctx.fillStyle = "rgba(15, 23, 42, 0.92)"; ctx.fillRect(10, 10, 380, 95);
    ctx.strokeStyle = "#16a34a"; ctx.lineWidth = 2.5; ctx.strokeRect(10, 10, 380, 95);
    
    // 상태 문구
    ctx.fillStyle = "#ffffff"; ctx.font = "bold 12px sans-serif"; ctx.textAlign = "left";
    ctx.fillText("🏃‍♀️ 외형 스킨: " + (player.stage === 0 ? "학칙 위반 사복 트레이닝 차림" : player.stage + "단계 이화교복 완비 중"), 25, 32);
    
    ctx.fillStyle = "#4ade80"; ctx.font = "bold 16px monospace"; ctx.textAlign = "right";
    ctx.fillText("SCORE: " + score, 375, 35);

    // [피드백 핵심 적용] 올바른 교복 착용 게이지 바 시각 디자인
    ctx.fillStyle = "#334155"; ctx.fillRect(25, 52, 350, 16); // 게이지 배경 바
    let gaugeWidth = (player.stage / 5) * 350;
    
    // 차오르는 무지개빛 에메랄드 그라데이션 게이지 광채 이펙트
    let gaugeGrad = ctx.createLinearGradient(25, 0, 375, 0);
    gaugeGrad.addColorStop(0, "#34d399"); gaugeGrad.addColorStop(1, "#059669");
    ctx.fillStyle = gaugeGrad; ctx.fillRect(25, 52, gaugeWidth, 16);
    
    // 게이지 경계선 눈금 분할 매핑 디테일
    ctx.strokeStyle = "rgba(15, 23, 42, 0.5)"; ctx.lineWidth = 1.5;
    for(let g = 1; g < 5; g++) {
        ctx.beginPath(); ctx.moveTo(25 + (g * 70), 52); ctx.lineTo(25 + (g * 70), 68); ctx.stroke();
    }
    
    // 게이지 퍼센트 텍스트 수치 각인
    ctx.fillStyle = "#ffffff"; ctx.font = "bold 10px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(`교복 매칭 정복도: ${player.stage * 20}%`, 200, 65);

    // 엔딩 시나리오 게임오버 및 승리 컷씬 팝업
    if (isGameOver) {
        ctx.fillStyle = "rgba(15, 23, 42, 0.96)"; ctx.fillRect(0, 0, 400, 650);
        ctx.fillStyle = "#ef4444"; ctx.font = "bold 28px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("🚨 교무실행 반성문 엔딩 🚨", 200, 290);
        ctx.fillStyle = "#ffffff"; ctx.font = "14px sans-serif";
        ctx.fillText("사복 함정에 현혹되었거나 복도 장애물에 붙잡혔습니다.", 200, 335);
        ctx.fillStyle = "#a1a1aa"; ctx.fillText("다시 아침 등교를 시작하려면 F5를 누르세요!", 200, 375);
    }
    if (player.stage >= 5) {
        ctx.fillStyle = "rgba(5, 150, 105, 0.98)"; ctx.fillRect(0, 0, 400, 650);
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 32px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("🎉 등교 대성공! (정복 완벽) 🎉", 200, 290);
        ctx.font = "15px sans-serif"; ctx.fillStyle = "#d1fae5";
        ctx.fillText("선생님의 복장 단속 레이더를 완벽하게 무력화하고", 200, 335);
        ctx.fillText("100% 품격 있는 정복 상태로 교실 진입에 세이프인!", 200, 360);
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
