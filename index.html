<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이화 러너즈: 파이널 원작 초월 에디션</title>
    <style>
        body { margin: 0; background: #070913; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; }
        #gameCanvas { border: 4px solid #10b981; box-shadow: 0 0 60px rgba(16, 185, 129, 0.35); border-radius: 24px; }
        .tip { color: #475569; margin-top: 15px; font-size: 14px; font-weight: bold; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="450" height="700"></canvas>
<div class="tip">
    🏫 세은·서진·하은 기획 [이화 러너즈: 카툰 일러스트 완결판] 🏫<br>
    🎮 [ A / D ] 또는 [좌우 방향키] 라인 이동 | [ Spacebar / W ] 장애물 점프 회피
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// [레퍼런스 투시각] 소실점 및 원근 가상 공간 셋업
const vanishX = 225;
const vanishY = 205;
const playerY = 585;

let player = { lane: 1, currentLaneX: 0, targetLaneX: 0, yOffset: 0, vy: 0, isGrounded: true, stage: 0, animFrame: 0 };
let items = [];
let spawnTimer = 0;
let teacherDistance = 5.0; 
let score = 0;
let isGameOver = false;
let gameTime = 0;

// 🔄 라운드별 차등 속도 및 스무스 배너 컨트롤러 (먹통 현상 완전 해결)
let currentRound = 1; 
let baseSpeed = 0.0075; // 1라운드는 정말 쉽고 여유롭게 시작합니다!
let gameSpeed = 0.0075;
let roundMessage = "ROUND 1: 아침 등교길 복도 (Easy Mode)";
let roundMessageTimer = 140; 

const gravity = 0.75;
const outlineColor = "#111827"; // 세련된 다크 아웃라인
const outlineWidth = 1.0;

window.addEventListener("keydown", e => {
    if (isGameOver) return;
    if ((e.key === "ArrowLeft" || e.key === "a" || e.key === "A") && player.lane > 0) player.lane--;
    if ((e.key === "ArrowRight" || e.key === "d" || e.key === "D") && player.lane < 2) player.lane++;
    
    if ((e.key === "ArrowUp" || e.key === "w" || e.key === "W" || e.key === " ") && player.isGrounded) {
        player.vy = -14.8;
        player.isGrounded = false;
    }
});

function spawn() {
    if (isGameOver || player.stage >= 5) return;
    let rLane = Math.floor(Math.random() * 3);
    
    // [피드백 반영] 1라운드는 난이도를 낮춰 장애물 확률을 최소화(18%), 3라운드만 돌발 스폰 기믹 가동
    let obstacleChance = 0.18 + (currentRound * 0.11); 
    let startingProgress = (currentRound === 3) ? 0.45 : 0.0;
    
    if (Math.random() < obstacleChance) {
        let obsTypes = ["giant_cart", "stacked_desks", "high_hurdle"];
        items.push({ lane: rLane, progress: startingProgress, isObstacle: true, obsType: obsTypes[Math.floor(Math.random() * obsTypes.length)], processed: false });
    } else {
        let tLane = (rLane + Math.floor(Math.random() * 2) + 1) % 3;
        items.push({ lane: rLane, progress: startingProgress, isTrap: false, isObstacle: false, type: player.stage, processed: false });
        if (Math.random() > 0.15) { 
            items.push({ lane: tLane, progress: startingProgress, isTrap: true, isObstacle: false, type: player.stage, processed: false });
        }
    }
}

function get3DPosition(lane, progress) {
    let targetLaneX = (lane - 1) * 160; 
    let screenX = vanishX + targetLaneX * progress;
    let screenY = vanishY + (playerY - vanishY) * progress;
    let scale = progress * 1.45; 
    return { x: screenX, y: screenY, scale: scale };
}

// ==========================================
// 🎨 [그림판 청산] 하이엔드 카툰 일러스트 패스 드로잉 엔진
// ==========================================
function drawPremiumBlouse(x, y, isTrap, scale) {
    ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
    ctx.strokeStyle = outlineColor; ctx.lineWidth = outlineWidth;
    
    // 상단 광원 부드러운 음영 그라데이션 매핑
    let shirtGrad = ctx.createLinearGradient(0, -15, 0, 20);
    shirtGrad.addColorStop(0, "#ffffff"); shirtGrad.addColorStop(1, "#f1f5f9");
    ctx.fillStyle = shirtGrad;
    
    ctx.beginPath();
    ctx.moveTo(-16, -15); ctx.bezierCurveTo(-10, -18, 10, -18, 16, -15);
    ctx.lineTo(20, 18); ctx.bezierCurveTo(10, 22, -10, 22, -20, 18);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    
    ctx.fillRect(-26, -15, 9, 20); ctx.strokeRect(-26, -15, 9, 20);
    ctx.fillRect(17, -15, 9, 20); ctx.strokeRect(17, -15, 9, 20);

    if (!isTrap) {
        // [이화여고 특유의 둥근 카라 묘사]
        ctx.fillStyle = "#ffffff";
        ctx.beginPath(); ctx.ellipse(-7, -13, 7, 5, Math.PI/6, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.ellipse(7, -13, 7, 5, -Math.PI/6, 0, Math.PI*2); ctx.fill(); ctx.stroke();
        // 소매 끝단 정교한 녹색 체크 라인
        ctx.fillStyle = "#064e3b"; ctx.fillRect(-26, 2, 9, 4); ctx.fillRect(17, 2, 9, 4);
    } else {
        ctx.fillStyle = "#cbd5e1"; ctx.beginPath(); ctx.moveTo(-7, -16); ctx.lineTo(0, -4); ctx.lineTo(7, -16); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
}

function drawPremiumRibbon(x, y, isTrap, scale) {
    ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
    ctx.strokeStyle = outlineColor; ctx.lineWidth = outlineWidth;
    if (!isTrap) {
        ctx.fillStyle = "#064e3b"; // 정밀 리본 매듭 곡선 묘사
        ctx.beginPath(); ctx.moveTo(0, -3); ctx.bezierCurveTo(-15, -15, -25, 0, -2, 5); ctx.lineTo(0, -3); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -3); ctx.bezierCurveTo(15, -15, 25, 0, 2, 5); ctx.lineTo(0, -3); ctx.fill(); ctx.stroke();
        ctx.fillRect(-11, 3, 7, 18); ctx.strokeRect(-11, 3, 7, 18);
        ctx.fillRect(4, 3, 7, 18); ctx.strokeRect(4, 3, 7, 18);
        ctx.strokeStyle = "#2563eb"; ctx.lineWidth = 1.8; ctx.strokeRect(-18, -6, 36, 9);
    } else {
        ctx.fillStyle = "#dc2626"; ctx.fillRect(-5, -16, 10, 32); ctx.strokeRect(-5, -16, 10, 32);
    }
    ctx.restore();
}

function drawPremiumVest(x, y, isTrap, scale) {
    ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
    ctx.strokeStyle = outlineColor; ctx.lineWidth = outlineWidth;
    
    let vestGrad = ctx.createLinearGradient(0, -15, 0, 22);
    vestGrad.addColorStop(0, "#4b5563"); vestGrad.addColorStop(1, "#374151");
    ctx.fillStyle = vestGrad;
    
    ctx.beginPath(); ctx.moveTo(-18, -15); ctx.lineTo(18, -15); ctx.lineTo(18, 22); ctx.lineTo(-18, 22); ctx.closePath(); ctx.fill(); ctx.stroke();
    
    if (!isTrap) {
        ctx.strokeStyle = "#fbbf24"; ctx.lineWidth = 2.2;
        ctx.beginPath(); ctx.moveTo(-9, -15); ctx.lineTo(0, -2); ctx.lineTo(10, -15); ctx.stroke();
        ctx.fillStyle = "#10b981"; ctx.beginPath(); ctx.arc(-8, -1, 4.2, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

function drawPremiumSkirt(x, y, isTrap, scale) {
    ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
    ctx.strokeStyle = outlineColor; ctx.lineWidth = outlineWidth;
    if (!isTrap) {
        let skirtGrad = ctx.createLinearGradient(0, -15, 0, 25);
        skirtGrad.addColorStop(0, "#1e1b4b"); skirtGrad.addColorStop(1, "#0f1138");
        ctx.fillStyle = skirtGrad;
        
        ctx.beginPath(); ctx.moveTo(-16, -15); ctx.lineTo(16, -15); ctx.lineTo(24, 25); ctx.lineTo(-24, 25); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.strokeStyle = "#080a1a"; ctx.lineWidth = 1.8;
        for (let i = -12; i <= 12; i += 4) { ctx.beginPath(); ctx.moveTo(i, -15); ctx.lineTo(i * 1.3, 25); ctx.stroke(); }
    } else {
        ctx.fillStyle = "#6b7280"; ctx.fillRect(-17, -15, 15, 40); ctx.strokeRect(-17, -15, 15, 40);
        ctx.fillRect(2, -15, 15, 40); ctx.strokeRect(2, -15, 15, 40);
    }
    ctx.restore();
}

function drawPremiumJacket(x, y, isTrap, scale) {
    ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
    ctx.strokeStyle = outlineColor; ctx.lineWidth = outlineWidth;
    
    let jackGrad = ctx.createLinearGradient(0, -18, 0, 24);
    jackGrad.addColorStop(0, isTrap ? "#334155" : "#0f172a");
    jackGrad.addColorStop(1, isTrap ? "#1e293b" : "#020718");
    ctx.fillStyle = jackGrad;
    
    ctx.beginPath(); ctx.moveTo(-22, -18); ctx.lineTo(22, -18); ctx.lineTo(20, 24); ctx.lineTo(-20, 24); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-22, -6); ctx.lineTo(0, 4); ctx.lineTo(22, -6); ctx.stroke();
    
    if (!isTrap) {
        ctx.fillStyle = "#fbbf24"; // 입체적인 금장 마이 단추 4개
        ctx.beginPath(); ctx.arc(-8, -2, 3, 0, Math.PI*2); ctx.arc(8, -2, 3, 0, Math.PI*2);
        ctx.arc(-8, 10, 3, 0, Math.PI*2); ctx.arc(8, 10, 3, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

function drawPremiumObstacle(x, y, obsType, scale) {
    ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
    ctx.strokeStyle = outlineColor; ctx.lineWidth = outlineWidth;

    if (obsType === "giant_cart") {
        ctx.fillStyle = "#0284c7"; ctx.fillRect(-35, -10, 70, 40); ctx.strokeRect(-35, -10, 70, 40);
        ctx.fillStyle = "#fbbf24"; ctx.fillRect(-28, -32, 56, 22); ctx.strokeRect(-28, -32, 56, 22);
        ctx.strokeStyle = "#475569"; ctx.lineWidth = 3.5;
        ctx.beginPath(); ctx.moveTo(-18, -32); ctx.lineTo(-26, -55); ctx.moveTo(18, -32); ctx.lineTo(26, -55); ctx.stroke();
    } else if (obsType === "stacked_desks") {
        ctx.fillStyle = "#b45309"; ctx.fillRect(-32, -25, 64, 12); ctx.strokeRect(-32, -25, 64, 12);
        ctx.fillRect(-24, 6, 48, 12); ctx.strokeRect(-24, 6, 48, 12);
        ctx.strokeStyle = "#334155"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(-26, -13); ctx.lineTo(-26, 6); ctx.moveTo(26, -13); ctx.lineTo(26, 6); ctx.stroke();
    } else if (obsType === "high_hurdle") {
        ctx.fillStyle = "#dc2626"; ctx.fillRect(-32, -42, 7, 75); ctx.fillRect(25, -42, 7, 75);
        ctx.strokeRect(-32, -42, 7, 75); ctx.strokeRect(25, -42, 7, 75);
        let barGrad = ctx.createLinearGradient(-25, 0, 25, 0);
        barGrad.addColorStop(0, "#1e293b"); barGrad.addColorStop(0.5, "#ffffff"); barGrad.addColorStop(1, "#1e293b");
        ctx.fillStyle = barGrad; ctx.fillRect(-25, -42, 50, 15); ctx.strokeRect(-25, -42, 50, 15);
    }
    ctx.restore();
}

// ==========================================
// 👮‍♂️ 3. 시네마틱 하단 배치 단속 선생님 뷰어
// ==========================================
function drawBottomTeacherOverlay() {
    if (teacherDistance > 4.0) return; 
    let entryProgress = (4.0 - teacherDistance) / 4.0; 
    let overlayY = 700 - (entryProgress * 110); 

    ctx.save();
    let warningGrad = ctx.createLinearGradient(0, overlayY, 0, 700);
    warningGrad.addColorStop(0, "rgba(239, 68, 68, 0.38)");
    warningGrad.addColorStop(1, "rgba(185, 28, 28, 0.88)");
    ctx.fillStyle = warningGrad; ctx.fillRect(0, overlayY, 450, 700 - overlayY);

    let centerX = 225 + Math.sin(gameTime * 0.22) * 25;
    ctx.fillStyle = "#1e293b"; ctx.strokeStyle = "#000000"; ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(centerX - 85, 700); ctx.lineTo(centerX - 55, overlayY + 45);
    ctx.lineTo(centerX + 55, overlayY + 45); ctx.lineTo(centerX + 85, 700); ctx.closePath(); ctx.fill(); ctx.stroke();

    ctx.fillStyle = "#fca5a5"; ctx.beginPath(); ctx.arc(centerX, overlayY + 30, 24, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.strokeStyle = "#000000"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(centerX - 9, overlayY + 26, 6, 0, Math.PI * 2); ctx.arc(centerX + 9, overlayY + 26, 6, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = "#ef4444"; ctx.fillRect(centerX - 5, overlayY + 40, 10, 5); 
    
    ctx.restore();
}

function update() {
    if (isGameOver) return;
    gameTime++;
    if (roundMessageTimer > 0) roundMessageTimer--;

    // 1라운드는 스무스하게 이지 모드로 빌드업, 2/3라운드 진입 시 속도 레벨업
    let roundMultiplier = 1.0 + (currentRound - 1) * 0.45;
    gameSpeed = baseSpeed * roundMultiplier + (score / 180000);

    player.targetLaneX = (player.lane - 1) * 155;
    player.currentLaneX += (player.targetLaneX - player.currentLaneX) * 0.25;
    player.animFrame += 0.25;

    if (!player.isGrounded) {
        player.yOffset += player.vy;
        player.vy += gravity;
        if (player.yOffset >= 0) {
            player.yOffset = 0; player.vy = 0; player.isGrounded = true;
        }
    }

    spawnTimer++;
    let adaptiveInterval = Math.max(20, 68 - (score / 450) - (currentRound * 9));
    if (spawnTimer > adaptiveInterval) { spawn(); spawnTimer = 0; }

    for (let i = items.length - 1; i >= 0; i--) {
        items[i].progress += gameSpeed;

        if (items[i].progress >= 0.88 && items[i].progress <= 0.98 && !items[i].processed) {
            if (items[i].lane === player.lane) {
                items[i].processed = true;
                
                if (items[i].isObstacle) {
                    if (player.yOffset > -32) { 
                        teacherDistance -= 1.6; 
                        score = Math.max(0, score - 200);
                        items.splice(i, 1);
                        continue;
                    }
                } else {
                    if (!items[i].isTrap) {
                        player.stage++;
                        score += 500;
                        teacherDistance = Math.min(5.0, teacherDistance + 1.0);
                        
                        if (player.stage >= 5 && currentRound < 3) {
                            currentRound++;
                            player.stage = 0; 
                            teacherDistance = 5.0;
                            items = [];
                            roundMessage = `🎉 ROUND ${currentRound}: 복도 질주 속도 UP!`;
                            roundMessageTimer = 150;
                            break; 
                        }
                    } else {
                        if (player.stage > 0) player.stage--; 
                        teacherDistance -= 2.2;
                    }
                    items.splice(i, 1);
                    continue;
                }
            }
        }

        if (items[i] && items[i].progress > 1.2) {
            items.splice(i, 1);
        }
    }

    if (teacherDistance <= 0) isGameOver = true;
}

function draw() {
    ctx.clearRect(0, 0, 450, 700);

    // ==========================================
    // ☀️ 1. [제공 자료 100% 투영] 고품격 웹툰풍 투시 복도 일러스트 아트워크
    // ==========================================
    let wallColor, floor1, floor2, beamColor;
    if (currentRound === 1) { // 2번 파일 분석: 화창하고 정갈한 민트/화이트풍 파스텔 실내 레이아웃
        wallColor = "#e6f4ea"; floor1 = "#fbfbfb"; floor2 = "#e2e8f0";
        beamColor = "rgba(255, 255, 255, 0.26)"; 
    } else if (currentRound === 2) { // 3번 파일 분석: 석양이 물드는 차분하고 힙한 연보라/아이보리 복도
        wallColor = "#f3e8ff"; floor1 = "#fdf4ff"; floor2 = "#e9d5ff";
        beamColor = "rgba(232, 121, 249, 0.16)";
    } else {
        wallColor = "#0f172a"; floor1 = "#1e293b"; floor2 = "#020617";
        beamColor = "rgba(99, 102, 241, 0.15)";
    }

    ctx.fillStyle = "#1e293b"; ctx.fillRect(0, 0, 450, 700); 
    ctx.fillStyle = wallColor; ctx.fillRect(0, 0, 90, 700); ctx.fillRect(360, 0, 90, 700); 
    
    // 고대비 오크/베이지 3D 타일 바닥판 드로잉
    let floorGrad = ctx.createLinearGradient(0, vanishY, 0, 700);
    floorGrad.addColorStop(0, floor1); floorGrad.addColorStop(1, floor2);
    ctx.fillStyle = floorGrad; ctx.fillRect(90, vanishY, 270, 700 - vanishY);

    // [3번 자료 핵심 반영] 정갈한 교실 문틀과 창문틀 무한 3D 스크롤 원근 배치
    ctx.fillStyle = "#b45309";
    for(let i=0; i<4; i++) {
        let doorProg = ((gameTime * 0.5 + i * 150) % 600) / 600;
        let dPosL = get3DPosition(0.1, doorProg);
        let dPosR = get3DPosition(1.9, doorProg);
        ctx.fillRect(dPosL.x - 30 * dPosL.scale, dPosL.y - 60 * dPosL.scale, 15 * dPosL.scale, 120 * dPosL.scale);
        ctx.fillRect(dPosR.x + 15 * dPosR.scale, dPosR.y - 60 * dPosR.scale, 15 * dPosR.scale, 120 * dPosR.scale);
    }

    // [3번 자료 핵심 반영] 벽면 원형 학교 아날로그 시계 탑재
    ctx.fillStyle = "#ffffff"; ctx.strokeStyle = "#4b5563"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(60, 260, 22, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    ctx.fillStyle = "#4b5563"; ctx.fillRect(59, 245, 2, 16); ctx.fillRect(59, 259, 10, 2); // 시계바늘

    // [2번 자료 핵심 반영] 우측 창가에서 복도 사선으로 부드럽게 쏟아지는 투명 채광 빔 효과
    ctx.fillStyle = beamColor;
    ctx.beginPath(); ctx.moveTo(0, vanishY + 10); ctx.lineTo(295, 700); ctx.lineTo(165, 700); ctx.lineTo(0, vanishY + 130); ctx.closePath(); ctx.fill();

    // 천장 격자선 투시 런 트랙 
    ctx.strokeStyle = "rgba(16, 185, 129, 0.4)"; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(vanishX - 45, vanishY); ctx.lineTo(120, 700);
    ctx.moveTo(vanishX + 45, vanishY); ctx.lineTo(330, 700);
    ctx.stroke();

    // ==========================================
    // 💎 2. 투시 비주얼을 타고 정밀 스케일링되는 에셋 스폰
    // ==========================================
    items.forEach(item => {
        let pos = get3DPosition(item.lane, item.progress);
        if (item.isObstacle) {
            drawPremiumObstacle(pos.x, pos.y, item.obsType, pos.scale);
        } else {
            if (item.type === 0) drawPremiumBlouse(pos.x, pos.y, item.isTrap, pos.scale);
            else if (item.type === 1) drawPremiumRibbon(pos.x, pos.y, item.isTrap, pos.scale);
            else if (item.type === 2) drawPremiumVest(pos.x, pos.y, item.isTrap, pos.scale);
            else if (item.type === 3) drawPremiumSkirt(pos.x, pos.y, item.isTrap, pos.scale);
            else if (item.type === 4) drawPremiumJacket(pos.x, pos.y, item.isTrap, pos.scale);
        }
    });

    // ==========================================
    // 🏃‍♀️ 3. [4번 자료 서브웨이 서퍼 감성 반영] 프리미엄 2D 벡터 아바타
    // ==========================================
    let pScreenX = vanishX + player.currentLaneX;
    let pScreenY = playerY + player.yOffset;
    let hairSway = Math.sin(player.animFrame) * 8;

    ctx.strokeStyle = outlineColor; ctx.lineWidth = outlineWidth;
    
    // 4번 원작 모델링 감성을 녹여낸 힙한 체형 볼륨 슬라이딩 드로잉
    ctx.fillStyle = "#ffedd5"; ctx.beginPath(); ctx.arc(pScreenX, pScreenY - 36, 15, 0, Math.PI*2); ctx.fill(); ctx.stroke(); // 쿨한 두상

    // [기획 절대 사수 사항] 달릴 때 생동감 있게 흩날리는 정교한 포니테일 머릿결 매핑
    ctx.fillStyle = "#1e293b"; ctx.beginPath(); ctx.arc(pScreenX, pScreenY - 45, 6, 0, Math.PI*2); ctx.fill(); 
    ctx.beginPath(); ctx.moveTo(pScreenX, pScreenY - 45); 
    ctx.bezierCurveTo(pScreenX + hairSway, pScreenY - 26, pScreenX + hairSway * 1.5, pScreenY - 8, pScreenX + hairSway * 1.2, pScreenY - 2);
    ctx.lineTo(pScreenX - 5, pScreenY - 45); ctx.closePath(); ctx.fillStyle = "#334155"; ctx.fill(); ctx.stroke();

    // 실시간 순차 스킨 갈아입기 레이어 (위반 사복 스타트룩)
    if (player.stage === 0) {
        ctx.fillStyle = "#cbd5e1"; ctx.fillRect(pScreenX-16, pScreenY-15, 32, 42); ctx.strokeRect(pScreenX-16, pScreenY-15, 32, 42); 
        ctx.fillStyle = "#475569"; ctx.fillRect(pScreenX-14, pScreenY+27, 28, 25); ctx.strokeRect(pScreenX-14, pScreenY+27, 28, 25); 
    } else {
        if (player.stage >= 1) { ctx.fillStyle = "#ffffff"; ctx.fillRect(pScreenX-16, pScreenY-15, 32, 42); ctx.strokeRect(pScreenX-16, pScreenY-15, 32, 42); } 
        if (player.stage >= 2) { ctx.fillStyle = "#064e3b"; ctx.beginPath(); ctx.arc(pScreenX, pScreenY-6, 5, 0, Math.PI*2); ctx.fill(); ctx.stroke(); } 
        if (player.stage >= 3) { ctx.fillStyle = "#4b5563"; ctx.fillRect(pScreenX-16, pScreenY-10, 32, 37); ctx.strokeRect(pScreenX-16, pScreenY-10, 32, 37); } 
        if (player.stage >= 4) { ctx.fillStyle = "#1e1b4b"; ctx.fillRect(pScreenX-18, pScreenY+27, 36, 24); ctx.strokeRect(pScreenX-18, pScreenY+27, 36, 24); } 
        if (player.stage >= 5) { ctx.fillStyle = "#0f172a"; ctx.fillRect(pScreenX-17, pScreenY-15, 34, 42); ctx.strokeRect(pScreenX-17, pScreenY-15, 34, 42); } 
    }

    // ==========================================
    // 👮‍♂️ 4. 시네마틱 하단 고정 스릴 만점 단속 선생님 UI 오버레이
    // ==========================================
    drawBottomTeacherOverlay();
    
    if (teacherDistance <= 2.0) {
        ctx.strokeStyle = "rgba(239, 68, 68, " + (Math.abs(Math.sin(gameTime * 0.12))) + ")";
        ctx.lineWidth = 10; ctx.strokeRect(0, 0, 450, 700);
    }

    // ==========================================
    // 📊 5. 탑 스마트 대시보드 UI 및 [실시간 교복 매칭 바 게이지]
    // ==========================================
    ctx.fillStyle = "rgba(15, 23, 42, 0.95)"; ctx.fillRect(15, 15, 420, 105);
    ctx.strokeStyle = "#10b981"; ctx.lineWidth = 2.5; ctx.strokeRect(15, 15, 420, 105);
    ctx.fillStyle = "#ffffff"; ctx.font = "bold 13px sans-serif"; ctx.textAlign = "left";
    ctx.fillText(`🏫 이화 러너즈 (ROUND ${currentRound} / 3)`, 30, 42);
    ctx.fillStyle = "#4ade80"; ctx.font = "bold 18px monospace"; ctx.textAlign = "right";
    ctx.fillText("SCORE: " + score, 415, 42);

    ctx.fillStyle = "#1e293b"; ctx.fillRect(30, 65, 390, 24); 
    let gaugeWidth = (player.stage / 5) * 390;
    let gaugeGrad = ctx.createLinearGradient(30, 0, 420, 0);
    gaugeGrad.addColorStop(0, "#10b981"); gaugeGrad.addColorStop(1, "#3b82f6"); 
    ctx.fillStyle = gaugeGrad; ctx.fillRect(30, 65, gaugeWidth, 24);
    ctx.fillStyle = "#ffffff"; ctx.font = "bold 11px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(`현재 등교 정복률: ${player.stage * 20}% 완료`, 225, 81);

    // 인게임 자연스러운 스무스 라운드 안내 배너 팝업
    if (roundMessageTimer > 0) {
        ctx.fillStyle = "rgba(16, 185, 129, 0.95)"; ctx.fillRect(0, 280, 450, 60);
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 16px sans-serif"; ctx.textAlign = "center";
        ctx.fillText(roundMessage, 225, 316);
    }

    if (isGameOver) {
        ctx.fillStyle = "rgba(11, 15, 25, 0.98)"; ctx.fillRect(0, 0, 450, 700);
        ctx.fillStyle = "#ef4444"; ctx.font = "bold 30px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("🚨 교무실행 반성문 엔딩 🚨", 225, 310);
        ctx.fillStyle = "#ffffff"; ctx.font = "15px sans-serif";
        ctx.fillText("거대 장애물 충돌 또는 사복 단속에 적발되었습니다.", 225, 360);
        ctx.fillStyle = "#64748b"; ctx.fillText("다시 등교하려면 F5(새로고침)를 누르세요!", 225, 400);
    }
    
    if (currentRound >= 3 && player.stage >= 5) {
        ctx.fillStyle = "rgba(4, 120, 87, 0.98)"; ctx.fillRect(0, 0, 450, 700);
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 34px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("🏆 지상 최강의 이화러너 완결 등극! 🏆", 225, 310);
        ctx.font = "16px sans-serif"; ctx.fillStyle = "#a7f3d0";
        ctx.fillText("세은, 서진, 하은 기획의 3D 공간 복도를 완벽히 지배하고", 225, 365);
        ctx.fillText("100% 교복 정복 상태로 안전 등교 완수 완료!", 225, 395);
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
