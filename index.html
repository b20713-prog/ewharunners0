<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이화 러너즈: 원작 초월 최종 완결판</title>
    <style>
        body { margin: 0; background: #090d16; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; }
        #gameCanvas { border: 6px solid #10b981; box-shadow: 0 0 40px rgba(16, 185, 129, 0.6); border-radius: 24px; }
        .tip { color: #64748b; margin-top: 15px; font-size: 14px; font-weight: bold; letter-spacing: 1px; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="460" height="720"></canvas>
<div class="tip">
    🔥 라운드가 올라갈수록 속도와 장애물 밀도가 폭발적으로 증가합니다! 🔥<br>
    🎮 [ A / D ] 이동 | [ Spacebar / W ] 초고공 점프
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// 3라인 시스템 및 다기능 물리 엔진
const lanes = [90, 230, 370];
let player = { lane: 1, currentX: 230, targetX: 230, yOffset: 0, vy: 0, isGrounded: true, stage: 0, animFrame: 0 };
let items = [];
let spawnTimer = 0;
let teacherDistance = 5.0; 
let score = 0;
let isGameOver = false;
let gameTime = 0;

// 🔄 [신규 시스템] 3단계 라운드 구조 체계
let currentRound = 1; // 1: 등교길 복도, 2: 급식실 런, 3: 야자 탈출 헬모드
let baseSpeed = 5.5;
let roundTargetScore = 2000; // 라운드 클리어 조건 점수

// 이화여고 교복 5종 마스터 데이터
const outfitBook = [
    { name: "블라우스", color: "#FFFFFF", line: "#10b981", trapColor: "#cbd5e1" },
    { name: "체크리본", color: "#064e3b", line: "#2563eb", trapColor: "#dc2626" },
    { name: "니트조끼", color: "#4b5563", line: "#fbbf24", trapColor: "#6b7280" },
    { name: "주름치마", color: "#1e1b4b", line: "#4338ca", trapColor: "#94a3b8" },
    { name: "자켓마이", color: "#0f172a", line: "#fbbf24", trapColor: "#334155" }
];

window.addEventListener("keydown", e => {
    if (isGameOver) return;
    if ((e.key === "ArrowLeft" || e.key === "a" || e.key === "A") && player.lane > 0) player.lane--;
    if ((e.key === "ArrowRight" || e.key === "d" || e.key === "D") && player.lane < 2) player.lane++;
    player.targetX = lanes[player.lane];

    if ((e.key === "ArrowUp" || e.key === "w" || e.key === "W" || e.key === " ") && player.isGrounded) {
        player.vy = -14.0; // 점프력 대폭 상향
        player.isGrounded = false;
    }
});

function spawn() {
    if (isGameOver) return;
    let rLane = Math.floor(Math.random() * 3);
    
    // 🔥 [피드백 반영] 라운드가 오를수록 장애물 스폰 확률과 밀도가 기하급수적으로 폭증
    let obstacleChance = 0.35 + (currentRound * 0.08); 
    
    if (Math.random() < obstacleChance) {
        let obsTypes = ["reaper_mop", "hell_desks", "laser_bar"];
        items.push({ x: lanes[rLane], y: -80, lane: rLane, isObstacle: true, obsType: obsTypes[Math.floor(Math.random() * obsTypes.length)] });
    } else {
        let tLane = (rLane + Math.floor(Math.random() * 2) + 1) % 3;
        items.push({ x: lanes[rLane], y: -80, lane: rLane, isTrap: false, isObstacle: false, type: player.stage, pulse: 0 });
        if (Math.random() > 0.12) { 
            items.push({ x: lanes[tLane], y: -80, lane: tLane, isTrap: true, isObstacle: false, type: player.stage, pulse: 0 });
        }
    }
}

// ==========================================
// 🎨 [볼륨 극대화] 입체 3D 그래픽 명암 렌더링 함수군
// ==========================================
function apply3DShading(ctx, x, y, w, h, baseColor) {
    ctx.strokeStyle = "#000000";
    ctx.lineWidth = 4;
    // 입체적인 표면 명암을 위한 선명한 그라데이션 내장 연산
    let grad = ctx.createLinearGradient(x, y, x + w, y);
    grad.addColorStop(0, "#ffffff");
    grad.addColorStop(0.2, baseColor);
    grad.addColorStop(1, "#000000");
    return grad;
}

function drawBlouse(x, y, isTrap) {
    ctx.save(); ctx.translate(x, y);
    ctx.fillStyle = apply3DShading(ctx, -20, -20, 40, 40, "#ffffff");
    ctx.beginPath(); ctx.moveTo(-20, -18); ctx.lineTo(20, -18); ctx.lineTo(24, 22); ctx.lineTo(-24, 22); ctx.closePath(); ctx.fill(); ctx.stroke();
    
    if (!isTrap) {
        // 이화여고 특유의 둥근 카라 및 소매 끝단 초록 체크 리얼 묘사
        ctx.fillStyle = "#10b981"; ctx.fillRect(-28, 4, 8, 6); ctx.fillRect(20, 4, 8, 6);
        ctx.fillStyle = "#f8fafc"; ctx.beginPath(); ctx.arc(-8, -14, 7, 0, Math.PI*2); ctx.arc(8, -14, 7, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    } else {
        ctx.fillStyle = "#94a3b8"; ctx.beginPath(); ctx.moveTo(-10, -18); ctx.lineTo(0, -2); ctx.lineTo(10, -18); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
}

function drawRibbon(x, y, isTrap) {
    ctx.save(); ctx.translate(x, y);
    if (!isTrap) {
        ctx.fillStyle = apply3DShading(ctx, -22, -12, 44, 24, "#064e3b");
        ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(-22, -12); ctx.lineTo(-22, 10); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(22, -12); ctx.lineTo(22, 10); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.fillRect(-15, 4, 9, 22); ctx.fillRect(6, 4, 9, 22);
    } else {
        ctx.fillStyle = "#b91c1c"; ctx.fillRect(-6, -18, 12, 35); ctx.strokeRect(-6, -18, 12, 35);
    }
    ctx.restore();
}

function drawVest(x, y, isTrap) {
    ctx.save(); ctx.translate(x, y);
    ctx.fillStyle = apply3DShading(ctx, -22, -16, 44, 40, "#374151");
    ctx.fillRect(-22, -16, 44, 40); ctx.strokeRect(-22, -16, 44, 40);
    
    if (!isTrap) {
        ctx.strokeStyle = "#fbbf24"; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(-11, -16); ctx.lineTo(0, -3); ctx.lineTo(11, -16); ctx.stroke();
        // 가슴의 자수 마크 로고
        ctx.fillStyle = "#10b981"; ctx.beginPath(); ctx.arc(-9, -2, 4, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

function drawSkirt(x, y, isTrap) {
    ctx.save(); ctx.translate(x, y);
    if (!isTrap) {
        ctx.fillStyle = apply3DShading(ctx, -20, -16, 40, 40, "#1e1b4b");
        ctx.beginPath(); ctx.moveTo(-18, -16); ctx.lineTo(18, -16); ctx.lineTo(26, 24); ctx.lineTo(-26, 24); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.strokeStyle = "#0f172a"; ctx.lineWidth = 2.5;
        for (let i = -14; i <= 14; i += 5) { ctx.beginPath(); ctx.moveTo(i, -16); ctx.lineTo(i * 1.3, 24); ctx.stroke(); }
    } else {
        ctx.fillStyle = "#6b7280"; ctx.fillRect(-18, -16, 16, 40); ctx.fillRect(2, -16, 16, 40); ctx.strokeRect(-18, -16, 16, 40); ctx.strokeRect(2, -16, 16, 40);
    }
    ctx.restore();
}

function drawJacket(x, y, isTrap) {
    ctx.save(); ctx.translate(x, y);
    ctx.fillStyle = apply3DShading(ctx, -24, -20, 48, 44, isTrap ? "#334155" : "#0f172a");
    ctx.fillRect(-24, -20, 48, 44); ctx.strokeRect(-24, -20, 48, 44);
    
    if (!isTrap) {
        ctx.fillStyle = "#fbbf24"; // 반짝이는 입체 금장 단추 4개
        ctx.beginPath(); 
        ctx.arc(-9, -4, 3.5, 0, Math.PI*2); ctx.arc(9, -4, 3.5, 0, Math.PI*2);
        ctx.arc(-9, 10, 3.5, 0, Math.PI*2); ctx.arc(9, 10, 3.5, 0, Math.PI*2);
        ctx.fill();
    }
    ctx.restore();
}

// ==========================================
// 👹 [피드백 적극 반영] 공포의 거대 장애물 3종 디자인
// ==========================================
function drawObstacle(x, y, obsType) {
    ctx.save(); ctx.translate(x, y);
    ctx.strokeStyle = "#000000"; ctx.lineWidth = 4;

    if (obsType === "reaper_mop") {
        // 1. 귀신 들린 듯 춤추는 폭주 대걸레 카트
        ctx.fillStyle = apply3DShading(ctx, -35, -10, 70, 40, "#0284c7");
        ctx.fillRect(-35, -10, 70, 40); ctx.strokeRect(-35, -10, 70, 40);
        // 휘날리는 걸레 자루 더미 표현
        ctx.strokeStyle = "#ef4444"; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(-20, -10); ctx.lineTo(-40, -50); ctx.moveTo(20, -10); ctx.lineTo(40, -50); ctx.stroke();
        ctx.fillStyle = "#facc15"; ctx.font = "16px sans-serif"; ctx.fillText("💥", -10, -20);
    } else if (obsType === "hell_desks") {
        // 2. 무너지기 일보 직전의 무시무시한 고층 책상 탑
        ctx.fillStyle = apply3DShading(ctx, -32, -30, 64, 60, "#b45309");
        ctx.fillRect(-32, -30, 64, 15); ctx.strokeRect(-32, -30, 64, 15);
        ctx.fillRect(-26, 5, 52, 15); ctx.strokeRect(-26, 5, 52, 15);
        ctx.strokeStyle = "#334155"; ctx.lineWidth = 5;
        ctx.beginPath(); ctx.moveTo(-28, -15); ctx.lineTo(-28, 35); ctx.moveTo(28, -15); ctx.lineTo(28, 35); ctx.stroke();
    } else if (obsType === "laser_bar") {
        // 3. 복도를 가로막는 공포의 초고층 체육 허들 바펜스
        ctx.fillStyle = "#dc2626"; ctx.fillRect(-35, -45, 10, 85); ctx.fillRect(25, -45, 10, 85);
        ctx.strokeRect(-35, -45, 10, 85); ctx.strokeRect(25, -45, 10, 85);
        // 얼룩말 경고 패턴
        let barGrad = ctx.createLinearGradient(-30, 0, 30, 0);
        barGrad.addColorStop(0, "#000000"); barGrad.addColorStop(0.5, "#fbbf24"); barGrad.addColorStop(1, "#000000");
        ctx.fillStyle = barGrad; ctx.fillRect(-30, -45, 60, 16); ctx.strokeRect(-30, -45, 60, 16);
    }
    ctx.restore();
}

// ==========================================
// 👮‍♂️ 3. 무빙 애니메이션이 가미된 리얼 단속 선생님 렌더러
// ==========================================
function drawDetailedTeacher(y) {
    ctx.save();
    let alertGrad = ctx.createLinearGradient(0, y, 0, y + 160);
    alertGrad.addColorStop(0, "rgba(220, 38, 38, 0.95)");
    alertGrad.addColorStop(1, "rgba(15, 23, 42, 0.85)");
    ctx.fillStyle = alertGrad; ctx.fillRect(0, y, 460, 160);

    let centerX = 230 + Math.sin(gameTime * 0.3) * 25; // 좌우로 섬뜩하게 슬라이딩 무빙 추격
    
    // 정장 어깨선 디자인
    ctx.fillStyle = "#1e293b"; ctx.strokeStyle = "#000000"; ctx.lineWidth = 3.5;
    ctx.beginPath(); ctx.moveTo(centerX - 65, y + 130); ctx.lineTo(centerX - 45, y + 60);
    ctx.lineTo(centerX + 45, y + 60); ctx.lineTo(centerX + 65, y + 130); ctx.closePath(); ctx.fill(); ctx.stroke();

    // 얼굴 묘사 및 레이저 눈빛 이펙트
    ctx.fillStyle = "#fca5a5"; ctx.beginPath(); ctx.arc(centerX, y + 32, 24, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    
    // 무서운 광채 안경
    ctx.strokeStyle = "#000000"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(centerX - 9, y + 26, 7, 0, Math.PI * 2); ctx.arc(centerX + 9, y + 26, 7, 0, Math.PI * 2); ctx.stroke();
    // 호루라기 분 노호의 입
    ctx.fillStyle = "#ef4444"; ctx.fillRect(centerX - 6, y + 42, 12, 6);
    
    ctx.restore();
}

function update() {
    if (isGameOver) return;
    gameTime++;

    // 🔥 [피드백 반영] 라운드가 오를수록 기본 속도가 기하급수적으로 폭증 (마약 같은 스피드 서서히 가속)
    let roundMultiplier = 1.0 + (currentRound - 1) * 0.25;
    let speedAccel = (score / 1200);
    gameSpeed = (baseSpeed * roundMultiplier) + speedAccel;

    player.currentX += (player.targetX - player.currentX) * 0.25;
    player.animFrame += 0.18;

    if (!player.isGrounded) {
        player.yOffset += player.vy;
        player.vy += gravity;
        if (player.yOffset >= 0) {
            player.yOffset = 0; player.vy = 0; player.isGrounded = true;
        }
    }

    spawnTimer++;
    // 라운드가 올라갈수록 장애물 스폰 간격이 극단적으로 좁아져 빽빽해집니다.
    let currentSpawnInterval = Math.max(26, 65 - (score / 400) - (currentRound * 6));
    if (spawnTimer > currentSpawnInterval) { spawn(); spawnTimer = 0; }

    for (let i = items.length - 1; i >= 0; i--) {
        items[i].y += gameSpeed;

        if (items[i].y > 500 && items[i].y < 565 && items[i].lane === player.lane) {
            if (items[i].isObstacle) {
                if (player.yOffset > -32) { // 초고공 점프로 회피 가능
                    teacherDistance -= 1.6; 
                    score = Math.max(0, score - 250);
                    items.splice(i, 1);
                }
            } else {
                if (!items[i].isTrap) {
                    player.stage++;
                    score += 400;
                    teacherDistance = Math.min(5.0, teacherDistance + 1.0);
                    
                    // 🔄 한 라운드에서 교복 5종 세트를 모두 수집 완료하면 럭셔리하게 다음 라운드로 레벨업 진화!
                    if (player.stage >= 5) {
                        if (currentRound < 3) {
                            currentRound++;
                            player.stage = 0; // 다음 라운드는 다시 사복 차림으로 시작!
                            teacherDistance = 5.0; // 선생님 거리 리셋
                            items = [];
                            alert(`🎉 ROUND ${currentRound} 진입! 더욱 무섭고 빽빽해진 복도를 질주하세요!`);
                        }
                    }
                } else {
                    if (player.stage > 0) player.stage--; 
                    teacherDistance -= 2.2;
                }
                items.splice(i, 1);
            }
            continue;
        }
        if (items[i].y > 730) items.splice(i, 1);
    }

    if (teacherDistance <= 0) isGameOver = true;
}

function draw() {
    ctx.clearRect(0, 0, 460, 720);

    // ==========================================
    // ☀️ 1. [라운드별 다채로운 테마 테크니컬 컬러링 시스템]
    // ==========================================
    let wallColor, floorStart, floorEnd, windowBeam;
    if (currentRound === 1) { // 1라운드: 찬란한 아침 햇살 복도
        wallColor = "#a7f3d0"; floorStart = "#fed7aa"; floorEnd = "#ea580c";
        windowBeam = "rgba(255, 255, 255, 0.16)";
    } else if (currentRound === 2) { // 2라운드: 불타는 석양의 방과후 복도
        wallColor = "#fde047"; floorStart = "#f97316"; floorEnd = "#b91c1c";
        windowBeam = "rgba(253, 186, 116, 0.25)";
    } else { // 3라운드: 헬모드 사이버네틱 야자 심야 탈출
        wallColor = "#1e1b4b"; floorStart = "#4c1d95"; floorEnd = "#0f172a";
        windowBeam = "rgba(139, 92, 246, 0.2)";
    }

    ctx.fillStyle = "#0f172a"; ctx.fillRect(0, 0, 460, 720); 
    ctx.fillStyle = wallColor; ctx.fillRect(0, 0, 95, 720); ctx.fillRect(365, 0, 95, 720); 
    
    // 입체 바닥 타일 렌더링
    let floorGrad = ctx.createLinearGradient(0, 180, 0, 720);
    floorGrad.addColorStop(0, floorStart); floorGrad.addColorStop(1, floorEnd);
    ctx.fillStyle = floorGrad; ctx.fillRect(95, 180, 270, 540);

    // 대각선 광원 실시간 명암 투영 효과
    ctx.fillStyle = windowBeam;
    ctx.beginPath(); ctx.moveTo(0, 200); ctx.lineTo(290, 720); ctx.lineTo(160, 720); ctx.lineTo(0, 320); ctx.closePath(); ctx.fill();

    // 3라인 전용 궤적 철길선 디자인
    ctx.strokeStyle = "rgba(16, 185, 129, 0.4)"; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(155, 180); ctx.lineTo(125, 720); ctx.moveTo(305, 180); ctx.lineTo(335, 720); ctx.stroke();

    // ==========================================
    // 💎 2. 고대비 테두리 적용된 드롭 아이템 & 장애물 그리기
    // ==========================================
    items.forEach(item => {
        if (item.isObstacle) {
            drawObstacle(item.x, item.y, item.obsType);
        } else {
            if (item.type === 0) drawBlouse(item.x, item.y, item.isTrap);
            else if (item.type === 1) drawRibbon(item.x, item.y, item.isTrap);
            else if (item.type === 2) drawVest(item.x, item.y, item.isTrap);
            else if (item.type === 3) drawSkirt(item.x, item.y, item.isTrap);
            else if (item.type === 4) drawJacket(item.x, item.y, item.isTrap);
        }
    });

    // ==========================================
    // 🏃‍♀️ 3. 플레이어 캐릭터 (역동적 포니테일 흔들림 묘사)
    // ==========================================
    let pX = player.currentX;
    let pY = 550 + player.yOffset; 
    let hairSway = Math.sin(player.animFrame) * 8;

    ctx.strokeStyle = "#000000"; ctx.lineWidth = 3.5;
    ctx.fillStyle = "#ffedd5"; ctx.beginPath(); ctx.arc(pX, pY - 35, 15, 0, Math.PI*2); ctx.fill(); ctx.stroke(); 
    
    // 활기찬 묶은 머리(포니테일) 그래픽 물리 묘사
    ctx.fillStyle = "#0f172a"; ctx.beginPath(); ctx.arc(pX, pY - 44, 7, 0, Math.PI*2); ctx.fill(); 
    ctx.beginPath(); ctx.moveTo(pX, pY - 44); ctx.quadraticCurveTo(pX + hairSway, pY - 22, pX + hairSway * 1.4, pY - 4);
    ctx.lineTo(pX - 6, pY - 44); ctx.closePath(); ctx.fillStyle = "#334155"; ctx.fill(); ctx.stroke();

    // 시작 조건: 사복 차림 스타트 -> 실시간 순차 스킨 레이어링
    if (player.stage === 0) {
        ctx.fillStyle = "#cbd5e1"; ctx.fillRect(pX-16, pY-15, 32, 42); ctx.strokeRect(pX-16, pY-15, 32, 42); // 회색빛 사복 추리닝 상의
        ctx.fillStyle = "#475569"; ctx.fillRect(pX-14, pY+27, 28, 25); ctx.strokeRect(pX-14, pY+27, 28, 25); // 사복 하의
    } else {
        if (player.stage >= 1) { ctx.fillStyle = "#ffffff"; ctx.fillRect(pX-16, pY-15, 32, 42); ctx.strokeRect(pX-16, pY-15, 32, 42); } 
        if (player.stage >= 2) { ctx.fillStyle = "#064e3b"; ctx.beginPath(); ctx.arc(pX, pY-6, 6, 0, Math.PI*2); ctx.fill(); ctx.stroke(); } 
        if (player.stage >= 3) { ctx.fillStyle = "#4b5563"; ctx.fillRect(pX-16, pY-10, 32, 37); ctx.strokeRect(pX-16, pY-10, 32, 37); } 
        if (player.stage >= 4) { ctx.fillStyle = "#1e1b4b"; ctx.fillRect(pX-18, pY+27, 36, 24); ctx.strokeRect(pX-18, pY+27, 36, 24); } 
        if (player.stage >= 5) { ctx.fillStyle = "#0f172a"; ctx.fillRect(pX-18, pY-15, 36, 44); ctx.strokeRect(pX-18, pY-15, 36, 44); } 
    }

    // ==========================================
    // 👮‍♂️ 4. 리얼 위협 기믹 탑재 추격 선생님 배치 연출
    // ==========================================
    let teacherTopY = 720 - (5.0 - teacherDistance) * 38;
    drawDetailedTeacher(teacherTopY);
    
    if (teacherDistance <= 2.5 && Math.floor(gameTime / 6) % 2 === 0) {
        ctx.fillStyle = "#facc15"; ctx.font = "bold 22px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("🚨 거리 좁혀짐! 복장 불량 즉시 검거! 🚨", pX, teacherTopY - 25);
    }

    // ==========================================
    // 📊 5. 메인 럭셔리 대시보드 UI 및 [실시간 교복 착용 게이지]
    // ==========================================
    ctx.fillStyle = "rgba(15, 23, 42, 0.95)"; ctx.fillRect(15, 15, 430, 105);
    ctx.strokeStyle = "#10b981"; ctx.lineWidth = 3; ctx.strokeRect(15, 15, 430, 105);
    
    ctx.fillStyle = "#ffffff"; ctx.font = "bold 13px sans-serif"; ctx.textAlign = "left";
    ctx.fillText(`🏫 묶은 머리 학생 질주 (ROUND ${currentRound} / 3)`, 30, 42);
    
    ctx.fillStyle = "#4ade80"; ctx.font = "bold 18px monospace"; ctx.textAlign = "right";
    ctx.fillText("SCORE: " + score, 430, 42);

    // [피드백 반영] 게이지 시스템 구축 디자인
    ctx.fillStyle = "#1e293b"; ctx.fillRect(30, 68, 400, 24); 
    let gaugeWidth = (player.stage / 5) * 400;
    
    let gaugeGrad = ctx.createLinearGradient(30, 0, 430, 0);
    gaugeGrad.addColorStop(0, "#10b981"); gaugeGrad.addColorStop(1, "#3b82f6"); // 라운드형 그라데이션 명암 기법
    ctx.fillStyle = gaugeGrad; ctx.fillRect(30, 68, gaugeWidth, 24);
    
    ctx.fillStyle = "#ffffff"; ctx.font = "bold 11px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(`현재 라운드 교복 완성도: ${player.stage * 20}% 완료`, 230, 84);

    // 엔딩 시나리오 제어 분기점
    if (isGameOver) {
        ctx.fillStyle = "rgba(9, 13, 22, 0.96)"; ctx.fillRect(0, 0, 460, 720);
        ctx.fillStyle = "#ef4444"; ctx.font = "bold 30px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("🚨 교무실행 반성문 엔딩 🚨", 230, 320);
        ctx.fillStyle = "#ffffff"; ctx.font = "15px sans-serif";
        ctx.fillText("거대 폭주 장애물에 박혔거나 사복 함정에 속아 잡혔습니다.", 230, 370);
        ctx.fillStyle = "#64748b"; ctx.fillText("새로고침(F5)을 눌러 다시 등교를 재개하세요!", 230, 410);
    }
    
    // 3라운드 최종 올 클리어 승리 요건 확인
    if (currentRound >= 3 && player.stage >= 5) {
        ctx.fillStyle = "rgba(4, 120, 87, 0.98)"; ctx.fillRect(0, 0, 460, 720);
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 34px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("🏆 지상 최강의 이화 러너 등극! 🏆", 230, 320);
        ctx.font = "16px sans-serif"; ctx.fillStyle = "#a7f3d0";
        ctx.fillText("3단계 하드코어 라운드의 모든 복장 단속을 파괴하고", 230, 375);
        ctx.fillText("완벽한 정복 세트로 세이프인에 성공한 위대한 역작!", 230, 400);
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
