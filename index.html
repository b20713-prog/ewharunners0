<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>이화 러너즈: 3D 원작 초월판</title>
    <style>
        body { margin: 0; background: #090d16; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; font-family: 'Malgun Gothic', sans-serif; overflow: hidden; }
        #gameCanvas { border: 4px solid #10b981; box-shadow: 0 0 50px rgba(16, 185, 129, 0.4); border-radius: 24px; }
        .tip { color: #64748b; margin-top: 15px; font-size: 14px; font-weight: bold; text-align: center; line-height: 1.6; }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="460" height="700"></canvas>
<div class="tip">
    🏫 세은·서진·하은 기획 [3D 이화 러너즈 마스터피스] 🏫<br>
    🎮 [ A / D ] 또는 [좌우 방향키] 라인 이동 | [ Spacebar / W ] 초고공 점프!
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// 3D 소실점(Vanishing Point) 및 가상 3D 공간 제어 변수
const vanishX = 230;
const vanishY = 220;
const playerY = 580;

let player = { lane: 1, currentLaneX: 0, targetLaneX: 0, yOffset: 0, vy: 0, isGrounded: true, stage: 0, animFrame: 0 };
let items = [];
let spawnTimer = 0;
let teacherDistance = 5.0; 
let score = 0;
let isGameOver = false;
let gameTime = 0;

// 🔄 라운드 시스템 및 인게임 배너용 변수 (버그 원천 수정)
let currentRound = 1; 
let baseSpeed = 0.012; // 3D progress 증가 스피드
let gameSpeed = 0.012;
let roundMessage = "ROUND 1: 아침 등교길 복도";
let roundMessageTimer = 120; // alert() 대신 화면에 자연스럽게 흐르는 배너 방식 채택

const gravity = 0.75;

// 이화여고 교복 5종 데이터 고대비 리매핑
const outfitBook = [
    { name: "블라우스", color: "#FFFFFF", accent: "#10b981" },
    { name: "체크리본", color: "#064e3b", accent: "#2563eb" },
    { name: "니트조끼", color: "#4b5563", accent: "#fbbf24" },
    { name: "주름치마", color: "#1e1b4b", accent: "#4338ca" },
    { name: "자켓마이", color: "#0f172a", accent: "#fbbf24" }
];

window.addEventListener("keydown", e => {
    if (isGameOver) return;
    if ((e.key === "ArrowLeft" || e.key === "a" || e.key === "A") && player.lane > 0) player.lane--;
    if ((e.key === "ArrowRight" || e.key === "d" || e.key === "D") && player.lane < 2) player.lane++;
    
    // 점프 커맨드 처리
    if ((e.key === "ArrowUp" || e.key === "w" || e.key === "W" || e.key === " ") && player.isGrounded) {
        player.vy = -14.5;
        player.isGrounded = false;
    }
});

function spawn() {
    if (isGameOver || player.stage >= 5) return;
    let rLane = Math.floor(Math.random() * 3);
    
    // 라운드가 오를수록 장애물 스폰 밀도 대폭 상향 (최대 60%)
    let obstacleChance = 0.38 + (currentRound * 0.08); 
    
    if (Math.random() < obstacleChance) {
        let obsTypes = ["giant_cart", "stacked_desks", "high_hurdle"];
        items.push({ lane: rLane, progress: 0, isObstacle: true, obsType: obsTypes[Math.floor(Math.random() * obsTypes.length)] });
    } else {
        let tLane = (rLane + Math.floor(Math.random() * 2) + 1) % 3;
        items.push({ lane: rLane, progress: 0, isTrap: false, isObstacle: false, type: player.stage });
        if (Math.random() > 0.15) { 
            items.push({ lane: tLane, progress: 0, isTrap: true, isObstacle: false, type: player.stage });
        }
    }
}

// ==========================================
// 🎨 3D 투시 투영 계산 및 세련된 그래픽 렌더링
// ==========================================
function get3DPosition(lane, progress) {
    // 소실점으로부터 원근법에 의해 퍼져나가는 x 좌표 계산
    let targetLaneX = (lane - 1) * 145; 
    let screenX = vanishX + targetLaneX * progress;
    let screenY = vanishY + (playerY - vanishY) * progress;
    let scale = progress * 1.3; // 멀어질수록 작고, 가까워질수록 거대해짐
    return { x: screenX, y: screenY, scale: scale };
}

function drawBlouse(x, y, isTrap, scale) {
    ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
    ctx.strokeStyle = "#1e293b"; ctx.lineWidth = 1.2; ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.moveTo(-18, -15); ctx.lineTo(18, -15); ctx.lineTo(22, 20); ctx.lineTo(-22, 20); ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.fillRect(-27, -15, 9, 22); ctx.fillRect(18, -15, 9, 22);
    ctx.strokeRect(-27, -15, 9, 22); ctx.strokeRect(18, -15, 9, 22);
    if (!isTrap) {
        ctx.fillStyle = "#064e3b"; ctx.fillRect(-27, 4, 9, 5); ctx.fillRect(18, 4, 9, 5); // 소매 체크
        ctx.fillStyle = "#f8fafc"; ctx.beginPath(); ctx.arc(-7, -13, 6, 0, Math.PI*2); ctx.arc(7, -13, 6, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    } else {
        ctx.fillStyle = "#cbd5e1"; ctx.beginPath(); ctx.moveTo(-8, -15); ctx.lineTo(0, -3); ctx.lineTo(8, -15); ctx.closePath(); ctx.fill();
    }
    ctx.restore();
}

function drawRibbon(x, y, isTrap, scale) {
    ctx.save(); ctx.translate(x, y);
    ctx.strokeStyle = "#1e293b"; ctx.lineWidth = 1.2;
    ctx.scale(scale, scale);
    if (!isTrap) {
        ctx.fillStyle = "#064e3b";
        ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(-22, -12); ctx.lineTo(-22, 8); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, -2); ctx.lineTo(22, -12); ctx.lineTo(22, 8); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.fillRect(-14, 3, 8, 20); ctx.fillRect(6, 3, 8, 20); ctx.strokeRect(-14, 3, 8, 20); ctx.strokeRect(6, 3, 8, 20);
    } else {
        ctx.fillStyle = "#dc2626"; ctx.fillRect(-5, -15, 10, 32); ctx.strokeRect(-5, -15, 10, 32);
    }
    ctx.restore();
}

function drawVest(x, y, isTrap, scale) {
    ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
    ctx.strokeStyle = "#1e293b"; ctx.lineWidth = 1.2;
    ctx.fillStyle = "#4b5563"; ctx.fillRect(-20, -15, 40, 38); ctx.strokeRect(-20, -15, 40, 38);
    if (!isTrap) {
        ctx.strokeStyle = "#fbbf24"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(-9, -15); ctx.lineTo(0, -3); ctx.lineTo(9, -15); ctx.stroke();
        ctx.fillStyle = "#10b981"; ctx.beginPath(); ctx.arc(-8, -2, 4, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

function drawSkirt(x, y, isTrap, scale) {
    ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
    ctx.strokeStyle = "#1e293b"; ctx.lineWidth = 1.2;
    if (!isTrap) {
        ctx.fillStyle = "#1e1b4b";
        ctx.beginPath(); ctx.moveTo(-17, -15); ctx.lineTo(17, -15); ctx.lineTo(25, 22); ctx.lineTo(-24, 22); ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.strokeStyle = "#111827";
        for (let i = -12; i <= 12; i += 4) { ctx.beginPath(); ctx.moveTo(i, -15); ctx.lineTo(i * 1.3, 22); ctx.stroke(); }
    } else {
        ctx.fillStyle = "#6b7280"; ctx.fillRect(-17, -15, 15, 38); ctx.fillRect(2, -15, 15, 38); ctx.strokeRect(-17, -15, 15, 38); ctx.strokeRect(2, -15, 15, 38);
    }
    ctx.restore();
}

function drawJacket(x, y, isTrap, scale) {
    ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
    ctx.strokeStyle = "#1e293b"; ctx.lineWidth = 1.2;
    ctx.fillStyle = isTrap ? "#334155" : "#0f172a"; ctx.fillRect(-22, -18, 44, 42); ctx.strokeRect(-22, -18, 44, 42);
    if (!isTrap) {
        ctx.fillStyle = "#fbbf24";
        ctx.beginPath(); ctx.arc(-8, -3, 2.5, 0, Math.PI*2); ctx.arc(8, -3, 2.5, 0, Math.PI*2); ctx.arc(-8, 9, 2.5, 0, Math.PI*2); ctx.arc(8, 9, 2.5, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
}

// ==========================================
// 🚧 [원작 재현] 입체적으로 커지며 돌진하는 거대 장애물
// ==========================================
function drawObstacle(x, y, obsType, scale) {
    ctx.save(); ctx.translate(x, y); ctx.scale(scale, scale);
    ctx.strokeStyle = "#0b0f19"; ctx.lineWidth = 1.5;

    if (obsType === "giant_cart") {
        ctx.fillStyle = "#0284c7"; ctx.fillRect(-35, -10, 70, 40); ctx.strokeRect(-35, -10, 70, 40);
        ctx.fillStyle = "#fbbf24"; ctx.fillRect(-28, -32, 56, 22); ctx.strokeRect(-28, -32, 56, 22);
        ctx.strokeStyle = "#475569"; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(-18, -32); ctx.lineTo(-28, -55); ctx.moveTo(18, -32); ctx.lineTo(30, -55); ctx.stroke();
    } else if (obsType === "stacked_desks") {
        ctx.fillStyle = "#b45309"; ctx.fillRect(-32, -25, 64, 12); ctx.strokeRect(-32, -25, 64, 12);
        ctx.fillRect(-24, 6, 48, 12); ctx.strokeRect(-24, 6, 48, 12);
        ctx.strokeStyle = "#334155"; ctx.lineWidth = 3.5;
        ctx.beginPath(); ctx.moveTo(-26, -13); ctx.lineTo(-26, 6); ctx.moveTo(26, -13); ctx.lineTo(26, 6); ctx.stroke();
    } else if (obsType === "high_hurdle") {
        ctx.fillStyle = "#dc2626"; ctx.fillRect(-32, -42, 7, 75); ctx.fillRect(25, -42, 7, 75);
        ctx.strokeRect(-32, -42, 7, 75); ctx.strokeRect(25, -42, 7, 75);
        let barGrad = ctx.createLinearGradient(-25, 0, 25, 0);
        barGrad.addColorStop(0, "#1e293b"); barGrad.addColorStop(0.5, "#ffffff"); barGrad.addColorStop(1, "#1e293b");
        ctx.fillStyle = barGrad; ctx.fillRect(-25, -42, 50, 15); ctx.strokeRect(-25, -42, 50, 15);
    }
    ctx.restore();
}

// ==========================================
// 👮‍♂️ 3. [추격 비주얼 극대화] 3D 스케일 애니메이팅 단속 선생님
// ==========================================
function draw3DTeacher() {
    // 선생님의 3D 거리는 플레이어 바로 뒤(Z축 압박감)로 환산하여 렌더링
    let teacherProgress = 1.05 - (teacherDistance * 0.08); 
    if (teacherProgress < 0.3) return; // 너무 멀면 안 보임

    let centerX = vanishX + Math.sin(gameTime * 0.2) * 20 * teacherProgress;
    let centerY = vanishY + (playerY - vanishY) * teacherProgress;
    let tScale = teacherProgress * 1.5;

    ctx.save(); ctx.translate(centerX, centerY); ctx.scale(tScale, tScale);
    ctx.strokeStyle = "#000000"; ctx.lineWidth = 1.5;

    // 거대한 위압감의 정장 어깨선
    ctx.fillStyle = "#1e293b";
    ctx.beginPath(); ctx.moveTo(-55, 90); ctx.lineTo(-40, 30); ctx.lineTo(40, 30); ctx.lineTo(55, 90); ctx.closePath(); ctx.fill(); ctx.stroke();

    // 분노로 붉어진 학생주임 선생님의 리얼 페이스
    ctx.fillStyle = "#fca5a5"; ctx.beginPath(); ctx.arc(0, 5, 20, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.strokeStyle = "#000000"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(-7, 2, 5, 0, Math.PI * 2); ctx.arc(7, 2, 5, 0, Math.PI * 2); ctx.stroke(); // 안경
    ctx.fillStyle = "#ef4444"; ctx.fillRect(-4, 14, 8, 4); // 화가 난 입

    // 뒤에서 쫓아오며 불어대는 무시무시한 단속 경고 시각화
    if (teacherDistance <= 2.5 && Math.floor(gameTime / 6) % 2 === 0) {
        ctx.fillStyle = "#facc15"; ctx.font = "bold 12px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("거기 안 서?! 📢", 0, -25);
    }
    ctx.restore();
}

function update() {
    if (isGameOver) return;
    gameTime++;
    if (roundMessageTimer > 0) roundMessageTimer--;

    // 라운드 및 점수 비례 속도 자동 증가 연산
    let roundMultiplier = 1.0 + (currentRound - 1) * 0.35;
    gameSpeed = baseSpeed * roundMultiplier + (score / 150000);

    // 플레이어 좌우 3라인 레일 이동 보정 LERP
    player.targetLaneX = (player.lane - 1) * 145;
    player.currentLaneX += (player.targetLaneX - player.currentLaneX) * 0.25;
    player.animFrame += 0.2;

    // 고공 점프 중력 가속도 연산
    if (!player.isGrounded) {
        player.yOffset += player.vy;
        player.vy += gravity;
        if (player.yOffset >= 0) {
            player.yOffset = 0; player.vy = 0; player.isGrounded = true;
        }
    }

    spawnTimer++;
    // 라운드가 올라갈수록 아이템과 거대 장애물이 쉴 틈 없이 빽빽하게 쏟아짐
    let adaptiveInterval = Math.max(22, 65 - (score / 350) - (currentRound * 8));
    if (spawnTimer > adaptiveInterval) { spawn(); spawnTimer = 0; }

    // 3D Progress (0에서 1로 향해 돌진) 관리 및 완벽 충돌 연산
    for (let i = items.length - 1; i >= 0; i--) {
        items[i].progress += gameSpeed;

        // 플레이어 시야(판정선 progress 0.88 ~ 0.98) 통과 시 충돌 체크
        if (items[i].progress >= 0.88 && items[i].progress <= 0.98 && items[i].lane === player.lane) {
            if (items[i].isObstacle) {
                if (player.yOffset > -35) { // 점프 높이가 낮으면 무조건 거대 크래시 적발!
                    teacherDistance -= 1.6; 
                    score = Math.max(0, score - 200);
                    items.splice(i, 1);
                }
            } else {
                // 의류 아이템 직접 매칭 획득 로직
                if (!items[i].isTrap) {
                    player.stage++;
                    score += 500;
                    teacherDistance = Math.min(5.0, teacherDistance + 1.0);
                    
                    // [라운드 전환 버그 전면 수정] 화면 안 멈추는 세련된 배너 교체 로직
                    if (player.stage >= 5 && currentRound < 3) {
                        currentRound++;
                        player.stage = 0; // 다음 라운드 사복 재출발
                        teacherDistance = 5.0;
                        items = [];
                        roundMessage = `🎉 ROUND ${currentRound}: 속도 및 밀도 한계 돌파!`;
                        roundMessageTimer = 150;
                        break;
                    }
                } else {
                    if (player.stage > 0) player.stage--; // 사복 먹으면 의상 탈의 벌칙
                    teacherDistance -= 2.2;
                }
                items.splice(i, 1);
            }
            continue;
        }

        // 화면 밖 유출 오브젝트 삭제
        if (items[i].progress > 1.2) {
            items.splice(i, 1);
        }
    }

    if (teacherDistance <= 0) isGameOver = true;
}

function draw() {
    ctx.clearRect(0, 0, 450, 700);

    // ==========================================
    // ☀️ 1. [고가시성 세련된 채광] Pseudo-3D 원근 묘사 학교 복도
    // ==========================================
    let wallColor, floorColor1, floorColor2, sunBeam;
    if (currentRound === 1) { // 1라: 상쾌한 햇살 아침 민트 복도
        wallColor = "#e6f4ea"; floorColor1 = "#f1f3f5"; floorColor2 = "#cfe2fe";
        sunBeam = "rgba(255, 255, 255, 0.25)";
    } else if (currentRound === 2) { // 2라: 감성적인 석양 노을 보라 복도
        wallColor = "#f3e8ff"; floorColor1 = "#faf5ff"; floorColor2 = "#e9d5ff";
        sunBeam = "rgba(216, 180, 254, 0.22)";
    } else { // 3라: 사이버네틱 미드나잇 야자 탈출 헬모드
        wallColor = "#0f172a"; floorColor1 = "#1e293b"; floorColor2 = "#020617";
        sunBeam = "rgba(99, 102, 241, 0.15)";
    }

    // 기본 레이아웃 구성
    ctx.fillStyle = "#1e293b"; ctx.fillRect(0, 0, 450, 700); 
    ctx.fillStyle = wallColor; ctx.fillRect(0, 0, 90, 700); ctx.fillRect(360, 0, 90, 700); 
    
    // 원근감 극대화형 그라데이션 바닥 타일
    let floorGrad = ctx.createLinearGradient(0, vanishY, 0, 700);
    floorGrad.addColorStop(0, floorColor1); floorGrad.addColorStop(1, floorColor2);
    ctx.fillStyle = floorGrad; ctx.fillRect(90, vanishY, 270, 700 - vanishY);

    // [피드백 반영] 은은하고 투명하게 대각선으로 쏟아지는 고급스러운 파스텔 햇살 효과
    ctx.fillStyle = sunBeam;
    ctx.beginPath(); ctx.moveTo(0, vanishY + 10); ctx.lineTo(280, 700); ctx.lineTo(150, 700); ctx.lineTo(0, vanishY + 120); ctx.closePath(); ctx.fill();

    // 3라인 레일 궤적 가이드라인 렌더링
    ctx.strokeStyle = "rgba(16, 185, 129, 0.35)"; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(vanishX - 45, vanishY); ctx.lineTo(120, 700);
    ctx.moveTo(vanishX + 45, vanishY); ctx.lineTo(330, 700);
    ctx.stroke();

    // ==========================================
    // 👮‍♂️ 2. 뒤에서 3D 스케일로 압박해오는 단속 선생님 렌더링
    // ==========================================
    draw3DTeacher();

    // ==========================================
    // 💎 3. 3D 원근 투사로 다가오는 아이템 & 거대 장애물
    // ==========================================
    items.forEach(item => {
        let pos = get3DPosition(item.lane, item.progress);
        if (item.isObstacle) {
            drawObstacle(pos.x, pos.y, item.obsType, pos.scale);
        } else {
            if (item.type === 0) drawBlouse(pos.x, pos.y, item.isTrap, pos.scale);
            else if (item.type === 1) drawRibbon(pos.x, pos.y, item.isTrap, pos.scale);
            else if (item.type === 2) drawVest(pos.x, pos.y, item.isTrap, pos.scale);
            else if (item.type === 3) drawSkirt(pos.x, pos.y, item.isTrap, pos.scale);
            else if (item.type === 4) drawJacket(pos.x, pos.y, item.isTrap, pos.scale);
        }
    });

    // ==========================================
    // 🏃‍♀️ 4. 플레이어 캐릭터 (포니테일 찰랑임 및 고공 점프 Y축 완벽 연동)
    // ==========================================
    let pScreenX = vanishX + player.currentLaneX;
    let pScreenY = playerY + player.yOffset;
    let hairSway = Math.sin(player.animFrame) * 8;

    ctx.strokeStyle = "#1e293b"; ctx.lineWidth = outlineWidth;
    ctx.fillStyle = "#ffedd5"; ctx.beginPath(); ctx.arc(pScreenX, pScreenY - 35, 15, 0, Math.PI*2); ctx.fill(); ctx.stroke(); // 두상

    // [기획 절대 사수] 뒤로 단정하게 찰랑이며 흔들리는 포니테일 묶은 머리
    ctx.fillStyle = "#0f172a"; ctx.beginPath(); ctx.arc(pScreenX, pScreenY - 44, 6, 0, Math.PI*2); ctx.fill(); 
    ctx.beginPath(); ctx.moveTo(pScreenX, pScreenY - 44); ctx.quadraticCurveTo(pScreenX + hairSway, pScreenY - 24, pScreenX + hairSway * 1.4, pScreenY - 4);
    ctx.lineTo(pScreenX - 5, pScreenY - 44); ctx.closePath(); ctx.fillStyle = "#334155"; ctx.fill(); ctx.stroke();

    // 0단계 완전 사복 상태 스타트 -> 실시간 누적 교복 스킨 체인지 연출
    if (player.stage === 0) {
        ctx.fillStyle = "#cbd5e1"; ctx.fillRect(pScreenX-16, pScreenY-15, 32, 42); ctx.strokeRect(pScreenX-16, pScreenY-15, 32, 42); // 사복 티
        ctx.fillStyle = "#475569"; ctx.fillRect(pScreenX-14, pScreenY+27, 28, 25); ctx.strokeRect(pScreenX-14, pScreenY+27, 28, 25); // 사복 추리닝
    } else {
        if (player.stage >= 1) { ctx.fillStyle = "#ffffff"; ctx.fillRect(pScreenX-16, pScreenY-15, 32, 42); ctx.strokeRect(pScreenX-16, pScreenY-15, 32, 42); } 
        if (player.stage >= 2) { ctx.fillStyle = "#064e3b"; ctx.beginPath(); ctx.arc(pScreenX, pScreenY-6, 5, 0, Math.PI*2); ctx.fill(); ctx.stroke(); } 
        if (player.stage >= 3) { ctx.fillStyle = "#4b5563"; ctx.fillRect(pScreenX-16, pScreenY-10, 32, 37); ctx.strokeRect(pScreenX-16, pScreenY-10, 32, 37); } 
        if (player.stage >= 4) { ctx.fillStyle = "#1e1b4b"; ctx.fillRect(pScreenX-18, pScreenY+27, 36, 24); ctx.strokeRect(pScreenX-18, pScreenY+27, 36, 24); } 
        if (player.stage >= 5) { ctx.fillStyle = "#0f172a"; ctx.fillRect(pScreenX-18, pScreenY-15, 36, 44); ctx.strokeRect(pScreenX-18, pScreenY-15, 36, 44); } 
    }

    // ==========================================
    // 📊 5. 탑 스마트 대시보드 및 [교복 착용도 메칭 게이지바]
    // ==========================================
    ctx.fillStyle = "rgba(15, 23, 42, 0.95)"; ctx.fillRect(15, 15, 430, 105);
    ctx.strokeStyle = "#10b981"; ctx.lineWidth = 2.5; ctx.strokeRect(15, 15, 430, 105);
    
    ctx.fillStyle = "#ffffff"; ctx.font = "bold 13px sans-serif"; ctx.textAlign = "left";
    ctx.fillText(`🏫 3D 이화 러너즈 (ROUND ${currentRound} / 3)`, 30, 42);
    
    ctx.fillStyle = "#4ade80"; ctx.font = "bold 18px monospace"; ctx.textAlign = "right";
    ctx.fillText("SCORE: " + score, 415, 42);

    // 프리미엄 실시간 게이지
    ctx.fillStyle = "#1e293b"; ctx.fillRect(30, 65, 390, 24); 
    let gaugeWidth = (player.stage / 5) * 390;
    let gaugeGrad = ctx.createLinearGradient(30, 0, 420, 0);
    gaugeGrad.addColorStop(0, "#10b981"); gaugeGrad.addColorStop(1, "#3b82f6"); 
    ctx.fillStyle = gaugeGrad; ctx.fillRect(30, 65, gaugeWidth, 24);
    
    ctx.fillStyle = "#ffffff"; ctx.font = "bold 11px sans-serif"; ctx.textAlign = "center";
    ctx.fillText(`현재 등교 정복률: ${player.stage * 20}% 완료`, 225, 81);

    // ==========================================
    // 🔄 6. [버그 완전 박멸] 실시간 인게임 라운드 전환 안내 배너
    // ==========================================
    if (roundMessageTimer > 0) {
        ctx.fillStyle = "rgba(16, 185, 129, 0.85)"; ctx.fillRect(0, 280, 450, 60);
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 18px sans-serif"; ctx.textAlign = "center";
        ctx.fillText(roundMessage, 225, 318);
    }

    // 엔딩 시나리오 제어
    if (isGameOver) {
        ctx.fillStyle = "rgba(11, 15, 25, 0.97)"; ctx.fillRect(0, 0, 450, 700);
        ctx.fillStyle = "#ef4444"; ctx.font = "bold 30px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("🚨 교무실행 엔딩 🚨", 225, 320);
        ctx.fillStyle = "#ffffff"; ctx.font = "15px sans-serif";
        ctx.fillText("3D 거대 장애물에 박혔거나 사복 함정에 걸려 붙잡혔습니다.", 225, 370);
        ctx.fillStyle = "#64748b"; ctx.fillText("다시 질주하려면 새로고침(F5)을 누르세요!", 225, 410);
    }
    
    if (currentRound >= 3 && player.stage >= 5) {
        ctx.fillStyle = "rgba(4, 120, 87, 0.98)"; ctx.fillRect(0, 0, 450, 700);
        ctx.fillStyle = "#ffffff"; ctx.font = "bold 34px sans-serif"; ctx.textAlign = "center";
        ctx.fillText("🏆 지상 최강의 이화러너 완결 클리어 🏆", 225, 320);
        ctx.font = "16px sans-serif"; ctx.fillStyle = "#a7f3d0";
        ctx.fillText("세은, 서진, 하은 기획의 3D 공간 복도를 완벽히 지배하고", 225, 375);
        ctx.fillText("100% 교복 정복 상태로 안전 등교 완수!", 225, 405);
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}
gameLoop();
</script>
</body>
</html>
